.scan-canvas-wrap { background: #000; border-radius: 12px; overflow: hidden; margin: 0 -0.5rem 1rem; }


/* Botones flotantes inferiores SOLO en modo calibración */
.scan-fixed-actions { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 12px calc(env(safe-area-inset-bottom, 0px) + 12px); background: linear-gradient(to top, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.85) 60%, rgba(10,10,10,0) 100%); display: flex; gap: 10px; z-index: 50; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
.scan-fixed-actions .scan-action-btn { margin-top: 0; }
.scan-fixed-actions .scan-action-btn.reset { flex: 0 0 38%; }
.scan-fixed-actions .scan-action-btn:not(.reset) { flex: 1; }
/* Padding inferior extra al scan-content cuando los botones flotan */
.scan-content.has-fixed-actions { padding-bottom: 90px; }

/* Barra de controles zoom/rotar SIEMPRE fija en la parte superior del modal de escaneo */
.scan-zoom-controls { 
  position: fixed; 
  top: 0; left: 0; right: 0; 
  z-index: 50; 
  background: rgba(10,10,10,0.97); 
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
  padding: 12px 14px; 
  border-bottom: 3px solid rgba(255,199,44,0.6); 
  box-shadow: 0 6px 16px rgba(0,0,0,0.7); 
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
/* Compensar el espacio que ocupa la barra fija */
.scan-content.scan-with-zoom-bar { padding-top: 100px; }
.scan-content.has-fixed-actions .scan-canvas-wrap { position: relative; z-index: 1; }


/* Modal de validación de país (alerta llamativa) */
.country-alert-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; animation: countryAlertFadeIn 0.2s ease; }
@keyframes countryAlertFadeIn { from { opacity: 0; } to { opacity: 1; } }
.country-alert-box { background: linear-gradient(135deg, #1a1a1a 0%, #2a1010 100%); border: 3px solid #FF3B30; border-radius: 18px; padding: 28px 24px; max-width: 480px; width: 100%; box-shadow: 0 10px 40px rgba(255,59,48,0.4), 0 0 0 6px rgba(255,59,48,0.15); animation: countryAlertSlide 0.3s ease; }
.country-alert-box.warning { border-color: #FFC72C; box-shadow: 0 10px 40px rgba(255,199,44,0.4), 0 0 0 6px rgba(255,199,44,0.15); background: linear-gradient(135deg, #1a1a1a 0%, #2a2010 100%); }
@keyframes countryAlertSlide { from { transform: translateY(-20px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
.country-alert-icon { font-size: 3.2rem; line-height: 1; margin-bottom: 12px; text-align: center; }
.country-alert-title { color: #FF3B30; font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 14px; letter-spacing: 0.3px; }
.country-alert-box.warning .country-alert-title { color: #FFC72C; }
.country-alert-msg { color: #fff; font-size: 1.05rem; font-weight: 600; line-height: 1.5; margin-bottom: 18px; text-align: center; }
.country-alert-summary { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 14px 16px; margin-bottom: 18px; color: rgba(255,255,255,0.9); font-size: 0.95rem; line-height: 1.6; }
.country-alert-summary strong { color: #FFC72C; font-size: 1.05rem; }
.country-alert-actions { display: flex; gap: 10px; }
.country-alert-btn { flex: 1; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 800; border: none; cursor: pointer; touch-action: manipulation; }
.country-alert-btn.cancel { background: #00B04F; color: white; }
.country-alert-btn.cancel:active { background: #008A3F; }
.country-alert-btn.confirm { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.2); }
.country-alert-btn.confirm:active { background: rgba(255,59,48,0.3); }

// ============ SISTEMA DE PERFILES ============
// localStorage:
//   - 'album_profiles_v2': { [profileId]: { name, data: {id: [s, r]}, created, modified } }
//   - 'album_active_profile': profileId
//   - 'album_mundial_2026_v1' (legacy): se migra al primer perfil

const PROFILES_KEY = 'album_profiles_v2';
const ACTIVE_KEY = 'album_active_profile';
const LEGACY_KEY = 'album_mundial_2026_v1';

function loadProfiles() {
  try {
    const raw = localStorage.getItem(PROFILES_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {};
}

function saveProfiles(profiles) {
  try { localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles)); } catch(e) {}
}

function getActiveProfileId() {
  return localStorage.getItem(ACTIVE_KEY);
}

function setActiveProfileId(id) {
  if (id) localStorage.setItem(ACTIVE_KEY, id);
  else localStorage.removeItem(ACTIVE_KEY);
}

function newProfileId() {
  return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
}

function createProfile(name) {
  const profiles = loadProfiles();
  const id = newProfileId();
  const now = Date.now();
  profiles[id] = { name: name, data: {}, created: now, modified: now };
  saveProfiles(profiles);
  return id;
}

// Migración: si hay datos antiguos sin perfil, crear "Mi Álbum"
function migrateLegacyIfNeeded() {
  const profiles = loadProfiles();
  if (Object.keys(profiles).length > 0) return; // ya hay perfiles
  
  try {
    const legacy = localStorage.getItem(LEGACY_KEY);
    if (legacy) {
      const legacyData = JSON.parse(legacy);
      if (legacyData && typeof legacyData === 'object') {
        // Migrar: el formato viejo era {id: s}. El nuevo es {id: [s, r]}
        const data = {};
        for (const id in legacyData) {
          data[id] = [legacyData[id], 0];
        }
        const profileId = newProfileId();
        const now = Date.now();
        profiles[profileId] = { 
          name: 'Mi Álbum', 
          data: data, 
          created: now, 
          modified: now 
        };
        saveProfiles(profiles);
        setActiveProfileId(profileId);
        console.log('[migrate] Datos antiguos migrados a perfil "Mi Álbum"');
      }
    }
  } catch(e) { console.warn('Migración falló:', e); }
}

migrateLegacyIfNeeded();

let activeProfileId = getActiveProfileId();
let profiles = loadProfiles();

// Si no hay perfil activo, mostrar selector después
// Si hay perfil pero ya no existe, limpiar
if (activeProfileId && !profiles[activeProfileId]) {
  setActiveProfileId(null);
  activeProfileId = null;
}

// Cargar datos del perfil activo (si hay)
let userData = {};
if (activeProfileId && profiles[activeProfileId]) {
  userData = profiles[activeProfileId].data || {};
}

const ITEMS = RAW.map(it => {
  const ud = userData[it.id];
  let s = it.s, r = it.r || 0;
  if (Array.isArray(ud)) { s = ud[0]; r = ud[1] || 0; }
  else if (typeof ud === 'number') { s = ud; }
  return { ...it, s: s, r: r };
});

let currentFilter = 'all';
let currentGroup = 'all';
let searchQuery = '';
let expandedTeams = new Set();
let pendingUnmark = null;

function save() {
  if (!activeProfileId) return;
  const data = {};
  ITEMS.forEach(it => {
    if (it.s === 1 || (it.r || 0) > 0) {
      data[it.id] = [it.s, it.r || 0];
    }
  });
  profiles[activeProfileId].data = data;
  profiles[activeProfileId].modified = Date.now();
  saveProfiles(profiles);
}

// Cargar datos de un perfil distinto (sin recargar la página)
function switchProfile(profileId) {
  if (!profiles[profileId]) return false;
  activeProfileId = profileId;
  setActiveProfileId(profileId);
  const data = profiles[profileId].data || {};
  ITEMS.forEach(it => {
    const ud = data[it.id];
    if (Array.isArray(ud)) { it.s = ud[0]; it.r = ud[1] || 0; }
    else if (typeof ud === 'number') { it.s = ud; it.r = 0; }
    else { it.s = 0; it.r = 0; }
  });
  updateStats();
  render();
  updateProfileBadge();
  return true;
}

function updateProfileBadge() {
  const badge = document.getElementById('profileBadge');
  if (!badge) return;
  if (activeProfileId && profiles[activeProfileId]) {
    badge.textContent = '👤 ' + profiles[activeProfileId].name;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function getGroups() {
  const gs = new Set();
  ITEMS.forEach(it => { if (it.g) gs.add(it.g); });
  const orden = ['Especial','A','B','C','D','E','F','G','H','I','J','K','L','History'];
  return Array.from(gs).sort((a,b) => orden.indexOf(a) - orden.indexOf(b));
}

function renderGroups() {
  const bar = document.getElementById('groupsBar');
  const groups = getGroups();
  let html = '<div class="group-chip ' + (currentGroup === 'all' ? 'active' : '') + '" data-group="all">Todos</div>';
  groups.forEach(g => {
    const label = (g === 'Especial') ? 'FIFA' : (g === 'History' ? 'History' : 'Grupo ' + g);
    html += '<div class="group-chip ' + (currentGroup === g ? 'active' : '') + '" data-group="' + g + '">' + label + '</div>';
  });
  bar.innerHTML = html;
  bar.querySelectorAll('.group-chip').forEach(chip => {
    chip.addEventListener('click', () => { currentGroup = chip.dataset.group; renderGroups(); render(); });
  });
}

function getTeams() {
  const teams = {};
  ITEMS.forEach(it => {
    if (!teams[it.eq]) teams[it.eq] = { name: it.eq, group: it.g, items: [], minPage: it.p || 999 };
    teams[it.eq].items.push(it);
    if (it.p && it.p < teams[it.eq].minPage) teams[it.eq].minPage = it.p;
  });
  return Object.values(teams);
}

function matchesFilters(it, team) {
  if (currentGroup !== 'all' && team.group !== currentGroup) return false;
  if (currentFilter === 'have' && it.s !== 1) return false;
  if (currentFilter === 'miss' && it.s !== 0) return false;
  if (currentFilter === 'rep' && (it.s !== 1 || (it.r || 0) === 0)) return false;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    if (!(it.j || '').toLowerCase().includes(q) && !(it.eq || '').toLowerCase().includes(q) && !(it.cod || '').toLowerCase().includes(q)) return false;
  }
  return true;
}

function render() {
  const teams = getTeams();
  const content = document.getElementById('content');
  let visibleTeams = teams.filter(t => {
    if (currentGroup !== 'all' && t.group !== currentGroup) return false;
    if (currentFilter !== 'all' || searchQuery) return t.items.some(it => matchesFilters(it, t));
    return true;
  });
  visibleTeams.sort((a,b) => a.minPage - b.minPage);

  if (visibleTeams.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="empty-state-emoji">🔍</div><div>No hay resultados</div></div>';
    return;
  }

  let html = '';
  let lastGroup = null;
  visibleTeams.forEach(team => {
    if (currentGroup === 'all' && team.group !== lastGroup) {
      const label = (team.group === 'Especial') ? '✨ FIFA Especiales' : (team.group === 'History' ? '🏆 World Cup History' : '⚽ Grupo ' + team.group);
      html += '<div class="group-divider">' + label + '</div>';
      lastGroup = team.group;
    }
    const total = team.items.length;
    const have = team.items.filter(it => it.s === 1).length;
    const pct = total > 0 ? Math.round((have/total)*100) : 0;
    const flag = FLAGS[team.name] || '⚽';
    const groupLabel = (team.group === 'Especial') ? 'FIFA' : (team.group === 'History' ? 'History' : 'Grupo ' + team.group);
    const isExp = expandedTeams.has(team.name);
    const isComplete = have === total;

    html += '<div class="team-card' + (isExp ? ' expanded' : '') + (isComplete ? ' completed' : '') + '" data-team="' + team.name + '">';
    html += '<div class="team-header">';
    html += '<div class="team-flag">' + flag + '</div>';
    html += '<div class="team-info"><div class="team-name">' + team.name + '</div><div class="team-group">' + groupLabel + '</div></div>';
    html += '<div class="team-progress"><div class="team-progress-text">' + have + '/' + total + '</div>';
    html += '<div class="team-progress-bar"><div class="team-progress-fill" style="width:' + pct + '%"></div></div></div>';
    html += '<div class="team-arrow">›</div></div>';
    html += '<div class="team-laminas">';
    team.items.forEach(it => {
      if (!matchesFilters(it, team)) return;
      const haveCls = it.s === 1 ? ' have' : '';
      const repCls = (it.s === 1 && (it.r || 0) > 0) ? ' has-rep' : '';
      html += '<div class="lamina-item' + haveCls + repCls + '" data-id="' + it.id + '">';
      html += '<div class="lamina-cod">' + it.cod + '</div>';
      html += '<div class="lamina-info"><div class="lamina-name">' + (it.j || it.t) + '</div>';
      html += '<div class="lamina-type">' + it.t + ' · Pág ' + it.p + '</div>';
      if (it.n) html += '<div class="lamina-note">⚠ ' + it.n + '</div>';
      html += '</div><div class="lamina-check">✓</div>';
      if (it.s === 1 && (it.r || 0) > 0) {
        html += '<div class="lamina-rep-badge">+' + it.r + '</div>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });
  content.innerHTML = html;

  content.querySelectorAll('.team-header').forEach(h => {
    h.addEventListener('click', () => {
      const card = h.closest('.team-card');
      const name = card.dataset.team;
      if (expandedTeams.has(name)) expandedTeams.delete(name);
      else expandedTeams.add(name);
      card.classList.toggle('expanded');
    });
  });
  content.querySelectorAll('.lamina-item').forEach(li => {
    li.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = li.dataset.id;
      const item = ITEMS.find(x => x.id === id);
      if (!item) return;
      
      // Si el tap fue sobre el badge "+N" → restar 1 repetida
      if (e.target.classList.contains('lamina-rep-badge')) {
        if ((item.r || 0) > 0) {
          item.r = item.r - 1;
          save();
          updateLaminaUI(li, item);
          updateStats();
          updateTeamCard(li.closest('.team-card'));
          showToast('−1 repetida · ' + item.cod + (item.r > 0 ? ' (' + item.r + ' rep)' : ' (sin repetidas)'));
        }
        return;
      }
      
      // Ciclo normal:
      // Falta (s=0) → Tengo (s=1, r=0)
      // Tengo → Tengo + 1 repetida (s=1, r=1)
      // Tengo + N repetidas → +1 más
      // Para QUITAR la lámina principal: long-press
      
      if (item.s === 0) {
        item.s = 1; item.r = 0;
        showToast('✓ ' + item.cod + ' agregada');
      } else {
        // Ya tiene → suma una repetida
        item.r = (item.r || 0) + 1;
        showToast('+1 repetida · ' + item.cod + ' (' + item.r + ' rep)');
      }
      save();
      updateStats();
      updateLaminaUI(li, item);
      updateTeamCard(li.closest('.team-card'));
    });
    
    // Long-press para quitar / resetear a Falta
    let pressTimer = null;
    li.addEventListener('touchstart', (e) => {
      pressTimer = setTimeout(() => {
        pressTimer = null;
        const id = li.dataset.id;
        const item = ITEMS.find(x => x.id === id);
        if (!item || item.s === 0) return;
        pendingUnmark = { item: item, element: li };
        document.getElementById('confirmLamina').textContent = item.cod + ' · ' + (item.j || item.t);
        document.getElementById('confirmOverlay').classList.add('active');
      }, 600);
    }, { passive: true });
    li.addEventListener('touchend', () => {
      if (pressTimer) clearTimeout(pressTimer);
      pressTimer = null;
    });
    li.addEventListener('touchmove', () => {
      if (pressTimer) clearTimeout(pressTimer);
      pressTimer = null;
    });
  });
}

// Actualiza la UI de una lámina según su estado

  if (item.s === 1) {

      li.classList.add('has-rep');

        li.appendChild(badge);

    if (codEl) codEl.style.background = 'var(--negro)';
    if (badge) badge.remove();
  }
}

// Copiar texto al portapapeles con fallback (funciona desde file:// también)
async function copyToClipboard(text) {
  // 1) Intentar API moderna (requiere HTTPS/localhost)
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch(e) { /* sigue al fallback */ }
  
  // 2) Fallback con textarea temporal + execCommand (funciona en file://)
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.top = '0';
    ta.style.left = '0';
    ta.style.width = '2em';
    ta.style.height = '2em';
    ta.style.padding = '0';
    ta.style.border = 'none';
    ta.style.outline = 'none';
    ta.style.boxShadow = 'none';
    ta.style.background = 'transparent';
    ta.style.opacity = '0';
    ta.setAttribute('readonly', '');
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch(e) {
    console.warn('Copia falló:', e);
    return false;
  }
}

function shareList(mode) {
  // mode: 'rep' = láminas repetidas (r > 0), 'miss' = láminas faltantes (s === 0)
  const lines = [];
  const title = mode === 'rep' ? 'Repetidas' : 'Me Faltan';
  const teamsOrder = getTeams();
  
  let totalCount = 0;
  // Primero los FWC/Especiales/History agrupados
  const fwcItems = ITEMS.filter(it => it.eq === 'FIFA' && 
    (mode === 'rep' ? (it.s === 1 && (it.r || 0) > 0) : it.s === 0));
  if (fwcItems.length > 0) {
    if (mode === 'rep') {
      // Cada lámina una sola vez, sin (×N) — la cantidad es info interna
      const formatted = fwcItems
        .sort((a,b) => {
          const numA = a.id === '00' ? 0 : parseInt(a.id.replace('FWC', ''));
          const numB = b.id === '00' ? 0 : parseInt(b.id.replace('FWC', ''));
          return numA - numB;
        })
        .map(it => it.id === '00' ? '0' : it.id.replace('FWC', ''))
        .join(', ');
      lines.push('FWC 📜: ' + formatted);
      totalCount += fwcItems.length;
    } else {
      const ids = fwcItems.map(it => it.id.replace('FWC', '').replace('00', '00'));
      lines.push('FWC 📜: ' + ids.join(', '));
      totalCount += fwcItems.length;
    }
  }
  
  // Luego cada país
  teamsOrder.forEach(team => {
    if (team.name === 'FIFA') return;
    const items = team.items.filter(it => 
      mode === 'rep' ? (it.s === 1 && (it.r || 0) > 0) : it.s === 0);
    if (items.length === 0) return;
    
    const abbr = TEAM_ABBR[team.name] || team.name.substring(0,3).toUpperCase();
    const flag = FLAGS[team.name] || '⚽';
    
    if (mode === 'rep') {
      // Cada lámina UNA VEZ, sin (×N) — la cantidad es info interna
      const nums = items
        .sort((a,b) => parseInt(a.id.replace(/[A-Z]/g, '')) - parseInt(b.id.replace(/[A-Z]/g, '')))
        .map(it => parseInt(it.id.replace(/[A-Z]/g, '')));
      lines.push(abbr + ' ' + flag + ': ' + nums.join(', '));
      totalCount += items.length;
    } else {
      // Faltantes: solo los números, una vez
      const nums = items.map(it => parseInt(it.id.replace(/[A-Z]/g, '')))
        .sort((a,b) => a-b);
      lines.push(abbr + ' ' + flag + ': ' + nums.join(', '));
      totalCount += items.length;
    }
  });
  
  if (totalCount === 0) {
    showToast(mode === 'rep' ? 'No tienes repetidas' : 'No te falta ninguna');
    return;
  }
  
  const fullText = title + ' (' + totalCount + ')\n' + lines.join('\n');
  
  // Mostrar modal con el texto y opciones
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = '<div style="background:#1a1a1a;color:white;border-radius:16px;padding:24px;max-width:520px;width:100%;">' +
    '<div style="font-size:1.2rem;font-weight:900;margin-bottom:12px;">📲 ' + title + ' (' + totalCount + ')</div>' +
    '<div style="font-size:0.9rem;opacity:0.85;margin-bottom:12px;">Listo para enviar por WhatsApp. Comparte o copia el texto:</div>' +
    '<textarea id="shareText" readonly style="width:100%;height:240px;padding:10px;border-radius:8px;border:1px solid #555;background:#0d0d0d;color:#e0e0e0;font-family:monospace;font-size:0.85rem;resize:vertical;white-space:pre;"></textarea>' +
    '<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">' +
    '<button id="shareNativeBtn" style="flex:1;min-width:120px;padding:14px;background:#25D366;color:white;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:1rem;">📲 Compartir</button>' +
    '<button id="copyShareBtn" style="flex:1;min-width:120px;padding:14px;background:#0066CC;color:white;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:1rem;">📋 Copiar</button>' +
    '<button id="closeShareBtn" style="flex:1;min-width:100px;padding:14px;background:rgba(255,255,255,0.15);color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:1rem;">Cerrar</button>' +
    '</div></div>';
  document.body.appendChild(overlay);
  document.getElementById('shareText').value = fullText;
  
  document.getElementById('shareNativeBtn').addEventListener('click', async () => {
    if (navigator.share) {
      try {
        await navigator.share({ text: fullText, title: title });
      } catch(e) { /* el usuario canceló */ }
    } else {
      const ok = await copyToClipboard(fullText);
      showToast(ok ? '✓ Copiado (no hay app para compartir)' : '⚠ No se pudo copiar, hazlo manualmente');
    }
  });
  document.getElementById('copyShareBtn').addEventListener('click', async () => {
    const ok = await copyToClipboard(fullText);
    showToast(ok ? '✓ Copiado al portapapeles' : '⚠ No se pudo copiar, hazlo manualmente');
  });
  document.getElementById('closeShareBtn').addEventListener('click', () => overlay.remove());
}

// Parsea un mensaje compartido (de repetidas o faltantes) y devuelve { type, items }
function parseSharedList(text) {
  if (!text) return null;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  
  // Detectar tipo del título
  let type = null;
  for (const line of lines) {
    if (/^repetidas\b/i.test(line)) { type = 'rep'; break; }
    if (/^(me\s+)?faltan?\b/i.test(line)) { type = 'miss'; break; }
  }
  
  // Mapa inverso abreviación → equipo
  const ABBR_TO_TEAM = {};
  for (const [team, abbr] of Object.entries(TEAM_ABBR)) {
    ABBR_TO_TEAM[abbr] = team;
  }
  
  // Parsear líneas con formato "XXX [emoji opcional]: 1, 2(×3), 5" etc.
  // Cada lámina aparece una vez; (×N) indica que el otro tiene N unidades
  const items = []; // { cod, abbr, num, team, count }
  for (const line of lines) {
    const m = line.match(/^([A-Z]{2,4})\s*[^:]*:\s*(.+)$/);
    if (!m) continue;
    const abbr = m[1];
    const restStr = m[2];
    
    // Tokens: cada uno es "número" o "número(×N)" o "número (×N)"
    const tokens = restStr.split(',').map(s => s.trim()).filter(Boolean);
    const parsedNums = []; // { num, count }
    for (const tk of tokens) {
      const tm = tk.match(/^(\d+)\s*(?:\(?\s*[×x]\s*(\d+)\s*\)?)?\s*$/i);
      if (!tm) continue;
      parsedNums.push({ num: parseInt(tm[1]), count: tm[2] ? parseInt(tm[2]) : 1 });
    }
    
    if (abbr === 'FWC') {
      for (const pn of parsedNums) {
        const codDisplay = pn.num === 0 ? '00' : 'FWC ' + pn.num;
        items.push({ cod: codDisplay, abbr: 'FWC', num: pn.num, team: 'FIFA', count: pn.count });
      }
    } else if (ABBR_TO_TEAM[abbr]) {
      for (const pn of parsedNums) {
        items.push({ cod: abbr + ' ' + pn.num, abbr, num: pn.num, team: ABBR_TO_TEAM[abbr], count: pn.count });
      }
    }
  }
  
  return { type, items, raw: text };
}

// Cruza la lista parseada con el álbum del usuario
function crossList(parsed) {
  if (!parsed || !parsed.items.length) return { matches: [], type: parsed ? parsed.type : null };
  
  // Sumar las cantidades por cod (un cod puede aparecer varias veces si vino sin (×N) duplicado)
  const counts = {};
  parsed.items.forEach(it => {
    counts[it.cod] = (counts[it.cod] || 0) + (it.count || 1);
  });
  
  const matches = [];
  const uniqueCods = Object.keys(counts);
  
  for (const cod of uniqueCods) {
    const myItem = ITEMS.find(x => x.cod === cod);
    if (!myItem) continue;
    
    if (parsed.type === 'rep') {
      // Sus repetidas → ¿cuáles me sirven? Las que yo no tengo (s=0)
      if (myItem.s === 0) {
        matches.push({ cod, team: myItem.eq, item: myItem, available: counts[cod] });
      }
    } else if (parsed.type === 'miss') {
      // Sus faltantes → ¿cuáles le puedo dar? Las que yo tengo repetidas (r > 0)
      if (myItem.s === 1 && (myItem.r || 0) > 0) {
        matches.push({ cod, team: myItem.eq, item: myItem, available: myItem.r });
      }
    }
  }
  
  return { matches, type: parsed.type };
}

// Genera el texto de resultado para compartir
function buildCrossResultText(matches, mode) {
  // mode: 'request' (te sirven, pedir) o 'offer' (le puedes dar)
  // En modo 'offer', priorizar las que tengo MÁS repetidas para deshacerme de stock primero
  const sortedMatches = matches.slice();
  if (mode === 'offer') {
    sortedMatches.sort((a, b) => (b.available || 0) - (a.available || 0));
  }
  
  const title = mode === 'request' ? 'Me sirven estas láminas' : 'Te puedo dar estas láminas';
  const lines = [title + ' (' + sortedMatches.length + ')'];
  
  // Agrupar por equipo, pero CONSERVANDO el orden de prioridad (más repetidas primero) en offer
  const byTeam = {};
  const teamOrder = [];
  sortedMatches.forEach(m => {
    if (!byTeam[m.team]) {
      byTeam[m.team] = [];
      teamOrder.push(m.team);
    }
    byTeam[m.team].push({ id: m.item.id, available: m.available });
  });
  
  if (mode === 'offer') {
    // En modo offer: ordenar equipos por la mayor cantidad de repetidas de cualquier lámina
    // y dentro de cada equipo, las láminas más repetidas primero
    teamOrder.sort((a, b) => {
      const maxA = Math.max(...byTeam[a].map(x => x.available));
      const maxB = Math.max(...byTeam[b].map(x => x.available));
      return maxB - maxA;
    });
    Object.keys(byTeam).forEach(team => {
      byTeam[team].sort((a, b) => b.available - a.available);
    });
  } else {
    // En modo request: orden estándar (FIFA primero, luego equipos en orden del álbum, números asc)
    Object.keys(byTeam).forEach(team => {
      byTeam[team].sort((a, b) => {
        const numA = a.id === '00' ? 0 : parseInt(a.id.replace(/[A-Z]/g, ''));
        const numB = b.id === '00' ? 0 : parseInt(b.id.replace(/[A-Z]/g, ''));
        return numA - numB;
      });
    });
  }
  
  // Para modo 'request' usar el orden del álbum; para 'offer' el orden por prioridad
  const teamsOrder = mode === 'offer' 
    ? teamOrder 
    : ['FIFA'].concat(getTeams().map(t => t.name).filter(n => n !== 'FIFA'));
  
  teamsOrder.forEach(teamName => {
    if (!byTeam[teamName]) return;
    const entries = byTeam[teamName];
    
    if (teamName === 'FIFA') {
      const nums = entries.map(e => {
        const id = e.id;
        if (id === '00') return '0';
        return id.replace('FWC', '');
      });
      // El orden de los números refleja la prioridad interna (más repetidas primero en offer),
      // pero NO mostramos la cantidad: es info interna.
      lines.push('FWC 📜: ' + nums.join(', '));
      return;
    }
    
    const abbr = TEAM_ABBR[teamName] || teamName.substring(0,3).toUpperCase();
    const flag = FLAGS[teamName] || '⚽';
    
    // Solo los números, sin (×N). El orden ya refleja la prioridad.
    const teamNums = entries.map(e => parseInt(e.id.replace(/[A-Z]/g, '')));
    
    lines.push(abbr + ' ' + flag + ': ' + teamNums.join(', '));
  });
  
  return lines.join('\n');
}

function doCross(parsed, prevOverlay) {
  const { matches, type } = crossList(parsed);
  
  if (matches.length === 0) {
    const msg = type === 'rep' 
      ? 'No hay coincidencias: ninguna de las repetidas que te ofrecen te sirve (ya las tienes todas).'
      : 'No hay coincidencias: no tienes repetidas de las láminas que le faltan.';
    showToast(msg);
    return;
  }
  
  const mode = type === 'rep' ? 'request' : 'offer';
  
  // En modo offer, pre-ordenar matches por más repetidas (para que el límite tome las top)
  const sortedMatches = matches.slice();
  if (mode === 'offer') {
    sortedMatches.sort((a, b) => (b.available || 0) - (a.available || 0));
  }
  
  // Estado mutable: cuántas mostrar (null = todas)
  let currentLimit = null;
  
  function rebuildText() {
    const shown = currentLimit && currentLimit < sortedMatches.length
      ? sortedMatches.slice(0, currentLimit)
      : sortedMatches;
    return buildCrossResultText(shown, mode);
  }
  
  let resultText = rebuildText();
  
  // Cerrar el modal anterior y mostrar resultado
  if (prevOverlay) prevOverlay.remove();
  
  const totalReceived = parsed.items.length;
  const titleHTML = type === 'rep'
    ? '<div style="color:#5DCAA5;">🎯 Te sirven ' + matches.length + ' láminas</div><div style="font-size:0.85rem;opacity:0.7;font-weight:normal;margin-top:2px;">de las ' + totalReceived + ' que te ofrecen</div>'
    : '<div style="color:#FFB35C;">🎁 Le puedes dar ' + matches.length + ' láminas</div><div style="font-size:0.85rem;opacity:0.7;font-weight:normal;margin-top:2px;">de las ' + totalReceived + ' que le faltan</div>';
  
  // Control de límite SOLO en modo offer (cuando le ofreces a alguien)
  const limitControlHTML = mode === 'offer'
    ? '<div style="background:rgba(255,107,53,0.12);border:1px solid rgba(255,107,53,0.4);padding:10px 12px;border-radius:8px;margin-bottom:12px;">' +
        '<div style="font-size:0.85rem;margin-bottom:6px;color:#FFB35C;font-weight:600;">📏 Limitar la cantidad a entregar</div>' +
        '<div style="font-size:0.75rem;opacity:0.75;margin-bottom:8px;line-height:1.4;">Las láminas con más repetidas se priorizan automáticamente.</div>' +
        '<div style="display:flex;gap:8px;align-items:center;">' +
          '<input type="number" id="crossLimitInput" min="1" max="' + matches.length + '" placeholder="Ej: 32" style="flex:1;padding:10px;border-radius:8px;border:1px solid #555;background:#0d0d0d;color:white;font-size:0.95rem;" />' +
          '<button id="crossLimitApplyBtn" style="padding:10px 16px;background:#FF6B35;color:white;border:none;border-radius:8px;font-weight:800;cursor:pointer;font-size:0.9rem;">Aplicar</button>' +
          '<button id="crossLimitResetBtn" style="padding:10px 12px;background:rgba(255,255,255,0.15);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:0.85rem;">Todas</button>' +
        '</div>' +
        '<div id="crossLimitStatus" style="font-size:0.78rem;color:#aaa;margin-top:6px;"></div>' +
      '</div>'
    : '';
  
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = '<div style="background:#1a1a1a;color:white;border-radius:16px;padding:24px;max-width:520px;width:100%;max-height:90vh;display:flex;flex-direction:column;">' +
    '<div style="font-size:1.2rem;font-weight:900;margin-bottom:12px;text-align:center;">' + titleHTML + '</div>' +
    limitControlHTML +
    '<textarea id="crossResultText" readonly style="width:100%;height:220px;padding:10px;border-radius:8px;border:1px solid #555;background:#0d0d0d;color:#e0e0e0;font-family:monospace;font-size:0.85rem;resize:vertical;white-space:pre;margin-bottom:12px;"></textarea>' +
    '<div style="display:flex;gap:10px;flex-wrap:wrap;">' +
      '<button id="crossShareBtn" style="flex:1;min-width:110px;padding:14px;background:#25D366;color:white;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:1rem;">📲 Compartir</button>' +
      '<button id="crossCopyBtn" style="flex:1;min-width:110px;padding:14px;background:#0066CC;color:white;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:1rem;">📋 Copiar</button>' +
      '<button id="crossCloseBtn" style="flex:1;min-width:90px;padding:14px;background:rgba(255,255,255,0.15);color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:1rem;">Cerrar</button>' +
    '</div></div>';
  document.body.appendChild(overlay);
  
  function refreshTextarea() {
    resultText = rebuildText();
    document.getElementById('crossResultText').value = resultText;
    const statusEl = document.getElementById('crossLimitStatus');
    if (statusEl) {
      if (currentLimit && currentLimit < sortedMatches.length) {
        statusEl.textContent = '✓ Mostrando las ' + currentLimit + ' más repetidas de ' + sortedMatches.length + ' disponibles';
        statusEl.style.color = '#5DCAA5';
      } else {
        statusEl.textContent = 'Mostrando todas (' + sortedMatches.length + ')';
        statusEl.style.color = '#aaa';
      }
    }
  }
  
  refreshTextarea();
  
  if (mode === 'offer') {
    const limitInput = document.getElementById('crossLimitInput');
    const applyBtn = document.getElementById('crossLimitApplyBtn');
    const resetBtn = document.getElementById('crossLimitResetBtn');
    
    function applyLimit() {
      const val = parseInt(limitInput.value);
      if (isNaN(val) || val < 1) {
        showToast('Ingresa un número válido');
        return;
      }
      if (val >= sortedMatches.length) {
        currentLimit = null;
        limitInput.value = '';
      } else {
        currentLimit = val;
      }
      refreshTextarea();
    }
    
    applyBtn.addEventListener('click', applyLimit);
    limitInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyLimit();
    });
    resetBtn.addEventListener('click', () => {
      currentLimit = null;
      limitInput.value = '';
      refreshTextarea();
    });
  }
  
  document.getElementById('crossShareBtn').addEventListener('click', async () => {
    if (navigator.share) {
      try { await navigator.share({ text: resultText }); } catch(e) {}
    } else {
      const ok = await copyToClipboard(resultText);
      showToast(ok ? '✓ Copiado' : '⚠ No se pudo copiar, hazlo manualmente');
    }
  });
  document.getElementById('crossCopyBtn').addEventListener('click', async () => {
    const ok = await copyToClipboard(resultText);
    showToast(ok ? '✓ Copiado al portapapeles' : '⚠ No se pudo copiar, hazlo manualmente');
  });
  document.getElementById('crossCloseBtn').addEventListener('click', () => overlay.remove());
}

  const tengoMap = {};
  data.tengo.forEach(entry => {
    if (typeof entry === 'string') tengoMap[entry] = 0;
    else if (Array.isArray(entry) && entry.length === 2) tengoMap[entry[0]] = entry[1];
  });
  let actualizados = 0;
  ITEMS.forEach(it => {
    const debeTener = (it.cod in tengoMap) ? 1 : 0;

    if (it.s !== debeTener || (it.r || 0) !== debeRep) {

<script>
// =============================================================
// MODO ESCANEO V5
// - Dos rectángulos independientes (4 esquinas por página)
// - Auto-rotación de fotos verticales
// - Plantel = lámina rotada 90° (mismas proporciones)
// - Botón manual "rotar 90°"
// =============================================================

// Relación de aspecto de las láminas Panini (ancho:alto)
// Lámina vertical mide aproximadamente 1:1.4
const LAMINA_AR = 1 / 1.4;  // = 0.714 (ratio ancho/alto de una lámina vertical)

function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b);
  const min = Math.min(r, g, b);
  const d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
    if (h < 0) h += 360;
  }
  const s = max === 0 ? 0 : d / max;
  const v = max;
  return [h / 2, s * 255, v * 255];
}


// Rota un ImageData 90/180/270° en sentido horario.
// Útil para desrotar crops a su orientación natural.
function rotateImageData(imgData, degrees) {
  if (degrees === 0 || !degrees) return imgData;
  const w = imgData.width;
  const h = imgData.height;
  const src = imgData.data;
  
  if (degrees === 90) {
    // 90° CW: src(x, y) → dst(h-1-y, x), nueva imagen h x w
    const nW = h, nH = w;
    const dst = new Uint8ClampedArray(nW * nH * 4);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const sIdx = (y * w + x) * 4;
        const dIdx = (x * nW + (h - 1 - y)) * 4;
        dst[dIdx] = src[sIdx];
        dst[dIdx+1] = src[sIdx+1];
        dst[dIdx+2] = src[sIdx+2];
        dst[dIdx+3] = src[sIdx+3];
      }
    }
    return new ImageData(dst, nW, nH);
  } else if (degrees === 180) {
    const dst = new Uint8ClampedArray(w * h * 4);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const sIdx = (y * w + x) * 4;
        const dIdx = ((h - 1 - y) * w + (w - 1 - x)) * 4;
        dst[dIdx] = src[sIdx];
        dst[dIdx+1] = src[sIdx+1];
        dst[dIdx+2] = src[sIdx+2];
        dst[dIdx+3] = src[sIdx+3];
      }
    }
    return new ImageData(dst, w, h);
  } else if (degrees === 270) {
    // 270° CW = 90° CCW: src(x, y) → dst(y, w-1-x), nueva imagen h x w
    const nW = h, nH = w;
    const dst = new Uint8ClampedArray(nW * nH * 4);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const sIdx = (y * w + x) * 4;
        const dIdx = ((w - 1 - x) * nW + y) * 4;
        dst[dIdx] = src[sIdx];
        dst[dIdx+1] = src[sIdx+1];
        dst[dIdx+2] = src[sIdx+2];
        dst[dIdx+3] = src[sIdx+3];
      }
    }
    return new ImageData(dst, nW, nH);
  }
  return imgData;
}

// Orden de zonas: we_band, grupo, fondo_c, der_top, der_bord
const TEAM_FP_ZONES = [

// Calcula el fingerprint multi-zona de una imagen (5 zonas)
function calculateFingerprint(sctx, img) {
  const fp = [];
  for (const z of TEAM_FP_ZONES) {
    const y1 = Math.floor(img.height * z.y1);
    const y2 = Math.floor(img.height * z.y2);
    const x1 = Math.floor(img.width * z.x1);
    const x2 = Math.floor(img.width * z.x2);
    const ww = x2 - x1, hh = y2 - y1;
    if (ww < 5 || hh < 5) { fp.push(null); continue; }
    let imgData;
    try { imgData = sctx.getImageData(x1, y1, ww, hh); }
    catch(e) { fp.push(null); continue; }
    const data = imgData.data;
    const hues = [], sats = [], vals = [];
    for (let i = 0; i < data.length; i += 4) {
      const [h, s, v] = rgbToHsv(data[i], data[i+1], data[i+2]);
      hues.push(h); sats.push(s); vals.push(v);
    }
    hues.sort((a,b)=>a-b); sats.sort((a,b)=>a-b); vals.sort((a,b)=>a-b);
    const mid = Math.floor(hues.length / 2);
    fp.push([hues[mid], sats[mid], vals[mid]]);
  }
  return fp;
}

// Distancia HSV ponderada
function hsvDist(c1, c2) {
  if (!c1 || !c2) return 0;
  let dh = Math.abs(c1[0] - c2[0]);
  if (dh > 90) dh = 180 - dh;
  if (Math.min(c1[1], c2[1]) < 30) dh = 0;
  return dh * 1.5 + Math.abs(c1[1]-c2[1]) * 0.5 + Math.abs(c1[2]-c2[2]) * 0.3;
}

// Suma total de distancia multi-zona
function totalFpDistance(fp1, fp2) {
  if (!fp1 || !fp2) return 0;
  let total = 0;
  for (let i = 0; i < fp1.length && i < fp2.length; i++) {
    total += hsvDist(fp1[i], fp2[i]);
  }
  return total;
}

// Validar coincidencia de país usando fingerprint multi-zona
function validateTeamMatch(teamName, measuredFp) {
  // ⚠️ VALIDACIÓN HSV MULTI-ZONA DESHABILITADA (poco confiable, solo log)
  const expected = TEAM_FINGERPRINTS[teamName];
  if (expected && measuredFp) {
    const dist = totalFpDistance(expected, measuredFp);
    console.log('[country-check] ' + teamName + ' dist=' + Math.round(dist) + ' (no se alerta al usuario)');
  }
  return { match: true, distance: 0, message: null };
}

// Colores "discriminantes": raros en el fondo del álbum, distintivos por país
// Si el país elegido NO los espera pero están presentes, hay mismatch fuerte
// Si el país elegido SÍ los espera pero no están presentes, también mismatch
const DISCRIMINANT_COLORS = ['verde', 'morado', 'naranja', 'azul_claro'];

// Analiza la presencia de cada color en la página izquierda de la imagen
function analyzeColorPresence(img) {
  if (!img) return null;
  const w = img.width, h = img.height;
  const y1 = Math.floor(h * 0.05);
  const y2 = Math.floor(h * 0.85);
  const x1 = Math.floor(w * 0.04);
  const x2 = Math.floor(w * 0.46);
  const ww = x2 - x1, hh = y2 - y1;
  if (ww < 10 || hh < 10) return null;
  
  const cnv = document.createElement('canvas');
  cnv.width = ww; cnv.height = hh;
  const cx = cnv.getContext('2d');
  cx.drawImage(img, x1, y1, ww, hh, 0, 0, ww, hh);
  const data = cx.getImageData(0, 0, ww, hh).data;
  
  const counts = {
    rojo: 0, naranja: 0, amarillo: 0, verde: 0,
    cian: 0, azul_claro: 0, azul: 0, morado: 0,
    blanco: 0, negro: 0
  };
  
  const total = ww * hh;
  for (let i = 0; i < data.length; i += 4) {
    const [H, S, V] = rgbToHsv(data[i], data[i+1], data[i+2]);
    // H en OpenCV: 0-180 (rgbToHsv aquí ya devuelve en ese rango)
    // En este código, rgbToHsv devuelve 0-360 para H, 0-255 S y V
    // Convertir a rango OpenCV
    const hOcv = H / 2;  // 0-180
    const sOcv = S;       // 0-255
    const vOcv = V;       // 0-255
    
    if (vOcv < 50) counts.negro++;
    else if (sOcv < 30 && vOcv > 200) counts.blanco++;
    else if ((hOcv < 8 || hOcv > 170) && sOcv > 100 && vOcv > 50) counts.rojo++;
    else if (hOcv >= 8 && hOcv < 22 && sOcv > 100 && vOcv > 60) counts.naranja++;
    else if (hOcv >= 22 && hOcv < 35 && sOcv > 100 && vOcv > 100) counts.amarillo++;
    else if (hOcv >= 40 && hOcv < 85 && sOcv > 60 && vOcv > 50) counts.verde++;
    else if (hOcv >= 85 && hOcv < 100 && sOcv > 60) counts.cian++;
    else if (hOcv >= 95 && hOcv < 110 && sOcv > 30 && sOcv < 100 && vOcv > 150) counts.azul_claro++;
    else if (hOcv >= 100 && hOcv < 130 && sOcv > 80 && vOcv > 40) counts.azul++;
    else if (hOcv >= 130 && hOcv < 165 && sOcv > 50) counts.morado++;
  }
  
  const pct = {};
  for (const k in counts) pct[k] = counts[k] / total;
  return pct;
}

// Valida el país por colores de bandera
function validateCountryByColors(teamName, presence) {
  if (!presence) return { status: 'unknown', message: null };
  const expected = COUNTRY_FLAG_COLORS[teamName];
  if (!expected) return { status: 'unknown', message: null };
  
  // Colores ESPERADOS que SÍ están presentes (>1.5% - más sensible)
  const presentExpected = expected.filter(c => (presence[c] || 0) > 0.015);
  // Colores DISCRIMINANTES que NO están en la lista esperada pero SÍ aparecen (>3% - más sensible)
  const unexpectedDiscriminant = DISCRIMINANT_COLORS.filter(c => 
    !expected.includes(c) && (presence[c] || 0) > 0.03
  );
  // Colores DISCRIMINANTES que SÍ están esperados pero NO aparecen (<1% - umbral más alto)
  const missingDiscriminant = expected.filter(c => 
    DISCRIMINANT_COLORS.includes(c) && (presence[c] || 0) < 0.01
  );
  
  console.log('[flag-check] ' + teamName,
    '| esperados:', expected,
    '| presentes:', presentExpected,
    '| inesperados-discrim:', unexpectedDiscriminant,
    '| faltantes-discrim:', missingDiscriminant);
  console.log('[flag-check] presencia exacta:', JSON.stringify(presence, (k,v) => 
    typeof v === 'number' ? Math.round(v*1000)/10 : v));
  
  // ERROR si hay color discriminante INESPERADO presente fuerte
  if (unexpectedDiscriminant.length >= 1) {
    return {
      status: 'error',
      message: 'país-equivocado',
      reason: 'inesperado: ' + unexpectedDiscriminant.join(', '),
      unexpected: unexpectedDiscriminant,
      missing: missingDiscriminant
    };
  }
  // ERROR si falta un color discriminante esperado
  if (missingDiscriminant.length >= 1) {
    return {
      status: 'error',
      message: 'país-equivocado',
      reason: 'falta: ' + missingDiscriminant.join(', '),
      unexpected: unexpectedDiscriminant,
      missing: missingDiscriminant
    };
  }
  
  // WARNING si menos del 50% de los colores esperados están presentes
  const ratio = presentExpected.length / expected.length;
  if (ratio < 0.5) {
    return { status: 'warning', message: 'coincidencia-débil' };
  }
  
  return { status: 'ok', message: null };
}



// =============================================================
// Auto-ajuste de grilla: detecta automáticamente las 2 páginas del álbum
// Usa proyección de gradientes (Sobel) para encontrar bordes del libro
// =============================================================
function autoDetectPages(img) {
  // Detección con PERSPECTIVA REAL:
  // 1. LOMO detectado en 3 bandas (línea inclinada)
  // 2. BORDES LATERALES detectados DIRECTAMENTE en cada banda Y
  //    (primer/último pico de gradiente vertical en la página)
  // 3. Regresión lineal para obtener líneas de borde inclinadas
  // 4. Construir trapezoides reales usando esas líneas
  
  const W = img.width, H = img.height;
  const scale = 400 / Math.max(W, H);
  const sw = Math.round(W * scale);
  const sh = Math.round(H * scale);
  
  const cnv = document.createElement('canvas');
  cnv.width = sw; cnv.height = sh;
  const cx = cnv.getContext('2d');
  cx.drawImage(img, 0, 0, sw, sh);
  const data = cx.getImageData(0, 0, sw, sh).data;
  
  const gray = new Float32Array(sw * sh);
  for (let i = 0; i < sw * sh; i++) {
    const idx = i * 4;
    gray[i] = 0.299 * data[idx] + 0.587 * data[idx+1] + 0.114 * data[idx+2];
  }
  
  function smooth1D(arr, radius) {
    const out = new Float32Array(arr.length);
    for (let i = 0; i < arr.length; i++) {
      let s = 0, c = 0;
      for (let k = -radius; k <= radius; k++) {
        const j = i + k;
        if (j >= 0 && j < arr.length) { s += arr[j]; c++; }
      }
      out[i] = s / c;
    }
    return out;
  }
  
  // Sobel X (bordes verticales)
  const gx = new Float32Array(sw * sh);
  for (let y = 1; y < sh - 1; y++) {
    for (let x = 1; x < sw - 1; x++) {
      const i = y * sw + x;
      gx[i] = -gray[i-sw-1] + gray[i-sw+1]
              -2*gray[i-1] + 2*gray[i+1]
              -gray[i+sw-1] + gray[i+sw+1];
    }
  }
  
  function detectSpineInBand(yStart, yEnd) {
    const xMin = Math.floor(sw * 0.40);
    const xMax = Math.floor(sw * 0.60);
    const colMeans = new Float32Array(xMax - xMin);
    for (let x = xMin; x < xMax; x++) {
      let s = 0;
      for (let y = yStart; y < yEnd; y++) s += gray[y * sw + x];
      colMeans[x - xMin] = s / (yEnd - yStart);
    }
    const smoothed = smooth1D(colMeans, 3);
    const offset = Math.max(10, Math.floor(sw * 0.03));
    let bestLocal = Math.floor(smoothed.length / 2);
    let bestDepth = -1;
    for (let i = 0; i < smoothed.length; i++) {
      const l = Math.max(0, i - offset);
      const r = Math.min(smoothed.length - 1, i + offset);
      const localMax = Math.max(smoothed[l], smoothed[r]);
      const depth = localMax - smoothed[i];
      if (depth > bestDepth) { bestDepth = depth; bestLocal = i; }
    }
    return xMin + bestLocal;
  }
  
  // === Detectar LOMO en 2 bandas (top y bot) ===
  const spineTopX = detectSpineInBand(Math.floor(sh * 0.10), Math.floor(sh * 0.35));
  const spineBotX = detectSpineInBand(Math.floor(sh * 0.65), Math.floor(sh * 0.90));
  
  // X del lomo en cualquier Y (lineal entre las 2 detecciones)
  function spineXAtYFrac(yFrac) {
    const yTopSrc = 0.225, yBotSrc = 0.775;
    const t = (yFrac - yTopSrc) / (yBotSrc - yTopSrc);
    return spineTopX + (spineBotX - spineTopX) * t;
  }
  
  // === Detectar BORDES LATERALES en bandas Y ===
  // En cada banda, encontrar el primer/último pico de |gx| significativo
  function findEdgeXInBand(yStart, yEnd, xStart, xEnd, fromLeft) {
    if (xEnd <= xStart) return null;
    const colSum = new Float32Array(xEnd - xStart);
    for (let x = xStart; x < xEnd; x++) {
      let s = 0;
      for (let y = yStart; y < yEnd; y++) s += Math.abs(gx[y * sw + x]);
      colSum[x - xStart] = s;
    }
    const smoothed = smooth1D(colSum, 2);
    let maxVal = 0;
    for (let i = 0; i < smoothed.length; i++) if (smoothed[i] > maxVal) maxVal = smoothed[i];
    // THRESHOLD ASIMÉTRICO:
    // - Lado IZQUIERDO (fromLeft=true): threshold 25% — el primer pico es típicamente
    //   la columna 0 de láminas (bordes definidos). No hay riesgo de picos débiles.
    // - Lado DERECHO (fromLeft=false): threshold 50% — necesario para descartar sombras
    //   débiles del borde del libro que estaban descuadrando R2.
    const threshFrac = fromLeft ? 0.25 : 0.50;
    const thresh = maxVal * threshFrac;
    const edgeExclusionPx = Math.floor(sw * 0.025);
    if (fromLeft) {
      for (let i = 0; i < smoothed.length; i++) {
        if (smoothed[i] > thresh) {
          const xAbs = xStart + i;
          if (xAbs < edgeExclusionPx) continue;
          return xAbs;
        }
      }
    } else {
      for (let i = smoothed.length - 1; i >= 0; i--) {
        if (smoothed[i] > thresh) {
          const xAbs = xStart + i;
          if (xAbs > sw - edgeExclusionPx) continue;
          return xAbs;
        }
      }
    }
    return null;
  }
  
  // Recolectar puntos de los bordes laterales en 6 bandas dentro del área de celdas
  const nBands = 6;
  const yCellsTopFrac = 0.095;  // antes 0.085 — subido para no cubrir el WE_ARE
  const yCellsBotFrac = 0.81;
  const leftEdgePoints = [];
  const rightEdgePoints = [];
  
  // OFFSET hacia adentro: con threshold 25% en izq y 50% en der,
  // el primer pico detectado a veces es el borde de la hoja, no la lámina
  // → necesitamos margen hacia adentro para llegar correctamente a la primera/última lámina
  const lateralOffsetPx = Math.floor(sw * 0.025);
  
  // ASIMETRÍA DEL LAYOUT (página derecha fila 1 tiene plantel, no llega al borde)
  const startBandLeft = 1;
  const startBandRight = 2;
  
  for (let i = startBandLeft; i < nBands; i++) {
    const yStartFrac = yCellsTopFrac + (yCellsBotFrac - yCellsTopFrac) * i / nBands;
    const yEndFrac = yCellsTopFrac + (yCellsBotFrac - yCellsTopFrac) * (i + 1) / nBands;
    const yS = Math.floor(sh * yStartFrac);
    const yE = Math.floor(sh * yEndFrac);
    const yMid = (yS + yE) / 2;
    const spineHere = spineXAtYFrac(yMid / sh);
    
    const lx = findEdgeXInBand(yS, yE, 2, Math.max(20, spineHere - 30), true);
    if (lx !== null) leftEdgePoints.push({ y: yMid, x: lx + lateralOffsetPx });
    
    if (i >= startBandRight) {
      const rx = findEdgeXInBand(yS, yE, Math.min(sw - 20, spineHere + 30), sw - 2, false);
      if (rx !== null) rightEdgePoints.push({ y: yMid, x: rx - lateralOffsetPx });
    }
  }
  
  // Regresión lineal: x = a*y + b sobre puntos
  function linearFit(points) {
    if (points.length < 2) return null;
    let sumY = 0, sumX = 0, sumXY = 0, sumY2 = 0;
    const n = points.length;
    for (const p of points) {
      sumY += p.y; sumX += p.x;
      sumXY += p.y * p.x;
      sumY2 += p.y * p.y;
    }
    const denom = (n * sumY2 - sumY * sumY);
    if (Math.abs(denom) < 0.01) return null;
    const a = (n * sumXY - sumY * sumX) / denom;
    const b = (sumX - a * sumY) / n;
    return { a, b };
  }
  
  // Filtrar outliers: quitar puntos a más de 15px de la regresión inicial
  function fitWithOutlierRejection(points) {
    if (points.length < 3) {
      // Pocos puntos: si la dispersión es baja, usar promedio simple
      if (points.length === 0) return null;
      const meanX = points.reduce((s,p)=>s+p.x, 0) / points.length;
      // Línea vertical: x = constante
      return { a: 0, b: meanX };
    }
    let fit = linearFit(points);
    if (!fit) return null;
    // Eliminar outliers (>15px de la regresión inicial)
    const filtered = points.filter(p => Math.abs(p.x - (fit.a * p.y + fit.b)) < 15);
    if (filtered.length < 3) return fit;
    return linearFit(filtered);
  }
  
  const leftFit = fitWithOutlierRejection(leftEdgePoints);
  const rightFit = fitWithOutlierRejection(rightEdgePoints);
  
  // Calcular x de los bordes en yTopCells y yBotCells
  function xAtFit(fit, yFrac, fallbackFrac) {
    if (!fit) return sw * fallbackFrac;
    const y = yFrac * sh;
    const x = fit.a * y + fit.b;
    // Clampear a rango razonable
    return Math.max(0, Math.min(sw - 1, x));
  }
  
  const xLeftTop = xAtFit(leftFit, yCellsTopFrac, 0.08);
  const xLeftBot = xAtFit(leftFit, yCellsBotFrac, 0.08);
  const xRightTop = xAtFit(rightFit, yCellsTopFrac, 0.92);
  const xRightBot = xAtFit(rightFit, yCellsBotFrac, 0.92);
  
  // MÍNIMO ASEGURADO: si la detección da un valor muy extremo (pegado al borde de la hoja),
  // forzar un mínimo razonable. Las celdas reales nunca empiezan antes de x=4% ni después de x=96%.
  function clampLeftX(x) {
    return Math.max(sw * 0.04, x);
  }
  function clampRightX(x) {
    return Math.min(sw * 0.96, x);
  }
  const xLeftTopFinal = clampLeftX(xLeftTop);
  const xLeftBotFinal = clampLeftX(xLeftBot);
  const xRightTopFinal = clampRightX(xRightTop);
  const xRightBotFinal = clampRightX(xRightBot);
  
  // Lomo en yTopCells y yBotCells
  const lomoMarginFrac = 0.018;
  const lomoOffsetPx = sw * lomoMarginFrac;
  const spineXTop = spineXAtYFrac(yCellsTopFrac);
  const spineXBot = spineXAtYFrac(yCellsBotFrac);
  
  const yTopPx = yCellsTopFrac * sh;
  const yBotPx = yCellsBotFrac * sh;
  
  // === Construir TRAPEZOIDES REALES ===
  const left = {
    TL: { x: xLeftTopFinal / sw,                  y: yCellsTopFrac },
    TR: { x: (spineXTop - lomoOffsetPx) / sw,     y: yCellsTopFrac },
    BR: { x: (spineXBot - lomoOffsetPx) / sw,     y: yCellsBotFrac },
    BL: { x: xLeftBotFinal / sw,                  y: yCellsBotFrac },
  };
  const right = {
    TL: { x: (spineXTop + lomoOffsetPx) / sw,     y: yCellsTopFrac },
    TR: { x: xRightTopFinal / sw,                 y: yCellsTopFrac },
    BR: { x: xRightBotFinal / sw,                 y: yCellsBotFrac },
    BL: { x: (spineXBot + lomoOffsetPx) / sw,     y: yCellsBotFrac },
  };
  
  const inclinationDeg = (Math.atan2(spineBotX - spineTopX, sh * 0.55) * 180 / Math.PI).toFixed(1);
  
  return {
    left, right,
    debug: {
      sw, sh,
      spineTopX, spineBotX,
      spineTopPct: (spineTopX / sw * 100).toFixed(0),
      spineBotPct: (spineBotX / sw * 100).toFixed(0),
      inclinationDeg,
      xLeftTopPct: (xLeftTopFinal / sw * 100).toFixed(0),
      xLeftBotPct: (xLeftBotFinal / sw * 100).toFixed(0),
      xRightTopPct: (xRightTopFinal / sw * 100).toFixed(0),
      xRightBotPct: (xRightBotFinal / sw * 100).toFixed(0),
      leftPointsN: leftEdgePoints.length,
      rightPointsN: rightEdgePoints.length
    }
  };
}

// Helpers de detección por color y texto (Fase 1)
// =============================================================

// Distancia entre dos colores HSV (con peso especial al matiz)
// Devuelve un valor 0-100 donde 0=idénticos, 100=muy distintos
function hsvDistance(h1, s1, v1, h2, s2, v2) {
  // Distancia circular del matiz (max 90 en escala 0-180)
  let dh = Math.abs(h1 - h2);
  if (dh > 90) dh = 180 - dh;
  // Si la saturación de alguno es muy baja, el matiz no es confiable
  const minSat = Math.min(s1, s2);
  if (minSat < 30) dh = 0;  // grises se comparan solo por brillo
  const ds = Math.abs(s1 - s2);
  const dv = Math.abs(v1 - v2);
  return (dh * 0.5) + (ds * 0.3) + (dv * 0.3);
}

// Extrae el color promedio HSV del centro de una zona en la imagen
// (zona en coords 0-1, retorna [h, s, v] medianos)
function extractCenterColor(sctx, img, cx, cy, halfW, halfH) {
  const cxPx = cx * img.width;
  const cyPx = cy * img.height;
  // Solo el 40% central de la zona
  const w = Math.max(8, Math.round(halfW * 0.8 * img.width));
  const h = Math.max(8, Math.round(halfH * 0.8 * img.height));
  const x = Math.max(0, Math.round(cxPx - w/2));
  const y = Math.max(0, Math.round(cyPx - h/2));
  const realW = Math.min(w, img.width - x);
  const realH = Math.min(h, img.height - y);
  if (realW < 5 || realH < 5) return null;
  
  let imgData;
  try {
    imgData = sctx.getImageData(x, y, realW, realH);
  } catch (e) { return null; }
  
  const data = imgData.data;
  const hues = [], sats = [], vals = [];
  for (let i = 0; i < data.length; i += 4) {
    const [hue, sat, val] = rgbToHsv(data[i], data[i+1], data[i+2]);
    hues.push(hue); sats.push(sat); vals.push(val);
  }
  // Usamos mediana en lugar de media (más robusta a outliers)
  hues.sort((a,b) => a-b);
  sats.sort((a,b) => a-b);
  vals.sort((a,b) => a-b);
  const mid = Math.floor(hues.length / 2);
  return [hues[mid], sats[mid], vals[mid]];
}

// Calibra los colores de fondo del álbum usando las zonas decorativas
// Las zonas WE_ARE (izq) y GRUPO (der) SIEMPRE están vacías y muestran
// el color/patrón característico del equipo en la página correspondiente.
function calibrateAlbumColors(sctx, img) {
  const result = { left: null, right: null };
  
  if (ScanState.leftFrame && PAGE_LEFT_DECOR.length > 0) {
    const decOrig = PAGE_LEFT_DECOR[0];  // WE_ARE
    const leftRot = ScanState.leftFrame.layoutRotation || 0;
    const dec = applyLayoutRotation(decOrig.u, decOrig.v, decOrig.w, decOrig.h, leftRot);
    // Obtener el centro de la zona en coords de imagen
    const center = uvToImageCoords(ScanState.leftFrame, dec.u, dec.v);
    const corners = [
      uvToImageCoords(ScanState.leftFrame, dec.u - dec.w/2, dec.v - dec.h/2),
      uvToImageCoords(ScanState.leftFrame, dec.u + dec.w/2, dec.v - dec.h/2),
      uvToImageCoords(ScanState.leftFrame, dec.u + dec.w/2, dec.v + dec.h/2),
      uvToImageCoords(ScanState.leftFrame, dec.u - dec.w/2, dec.v + dec.h/2),
    ];
    const minX = Math.min(...corners.map(c => c.x));
    const maxX = Math.max(...corners.map(c => c.x));
    const minY = Math.min(...corners.map(c => c.y));
    const maxY = Math.max(...corners.map(c => c.y));
    result.left = extractCenterColor(sctx, img, (minX+maxX)/2, (minY+maxY)/2, (maxX-minX)/2, (maxY-minY)/2);
  }
  
  if (ScanState.rightFrame && PAGE_RIGHT_DECOR.length > 0) {
    const decOrig = PAGE_RIGHT_DECOR[0];  // GRUPO
    const rightRot = ScanState.rightFrame.layoutRotation || 0;
    const dec = applyLayoutRotation(decOrig.u, decOrig.v, decOrig.w, decOrig.h, rightRot);
    const corners = [
      uvToImageCoords(ScanState.rightFrame, dec.u - dec.w/2, dec.v - dec.h/2),
      uvToImageCoords(ScanState.rightFrame, dec.u + dec.w/2, dec.v - dec.h/2),
      uvToImageCoords(ScanState.rightFrame, dec.u + dec.w/2, dec.v + dec.h/2),
      uvToImageCoords(ScanState.rightFrame, dec.u - dec.w/2, dec.v + dec.h/2),
    ];
    const minX = Math.min(...corners.map(c => c.x));
    const maxX = Math.max(...corners.map(c => c.x));
    const minY = Math.min(...corners.map(c => c.y));
    const maxY = Math.max(...corners.map(c => c.y));
    result.right = extractCenterColor(sctx, img, (minX+maxX)/2, (minY+maxY)/2, (maxX-minX)/2, (maxY-minY)/2);
  }
  
  // Fallback: si una zona no se pudo extraer, usar la otra
  if (!result.left && result.right) result.left = result.right;
  if (!result.right && result.left) result.right = result.left;
  
  return result;
}

// Cuenta qué % de píxeles del crop coinciden con el color de fondo del álbum
// (usando un umbral de distancia HSV)
function detectAlbumBgMatch(imgData, refColor) {
  if (!refColor) return 0;
  const [refH, refS, refV] = refColor;
  const data = imgData.data;
  const w = imgData.width;
  const h = imgData.height;
  // Solo zona central 60% (el 20% de margen ya tiene el texto)
  const mx = Math.floor(w * 0.20);
  const my = Math.floor(h * 0.20);
  let matches = 0, total = 0;
  for (let y = my; y < h - my; y++) {
    for (let x = mx; x < w - mx; x++) {
      const idx = (y * w + x) * 4;
      const [hue, sat, val] = rgbToHsv(data[idx], data[idx+1], data[idx+2]);
      const dist = hsvDistance(hue, sat, val, refH, refS, refV);
      if (dist < 25) matches++;  // umbral generoso
      total++;
    }
  }
  return total > 0 ? (matches / total) * 100 : 0;
}

// Detecta píxeles blancos/muy claros centrados (probable texto "PAN 4")
// Devuelve el % de píxeles que cumplen V>200 AND S<40 en el centro
function detectWhiteText(imgData) {
  const data = imgData.data;
  const w = imgData.width;
  const h = imgData.height;
  // Solo el 50% central
  const mx = Math.floor(w * 0.25);
  const my = Math.floor(h * 0.25);
  let whites = 0, total = 0;
  for (let y = my; y < h - my; y++) {
    for (let x = mx; x < w - mx; x++) {
      const idx = (y * w + x) * 4;
      const [hue, sat, val] = rgbToHsv(data[idx], data[idx+1], data[idx+2]);
      if (val > 200 && sat < 40) whites++;
      total++;
    }
  }
  return total > 0 ? (whites / total) * 100 : 0;
}


// =============================================================
// Detectores espaciales (Fase 2)
// Aprovechan FORMAS y PATRONES, no solo estadísticas globales
// =============================================================

// Analiza patrones espaciales: piel/cara, camiseta uniforme, variedad vertical
// + Detectores vectoriales: distribución de bordes, líneas Hough
function analyzeSpatialPatterns(imgData) {
  const data = imgData.data;
  const w = imgData.width;
  const h = imgData.height;
  
  // Precalcular HSV de cada píxel (más eficiente que recalcular varias veces)
  const hsv = new Float32Array(w * h * 3);
  const gray = new Uint8Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const idx = i * 4;
    const r = data[idx], g = data[idx+1], b = data[idx+2];
    const [hue, sat, val] = rgbToHsv(r, g, b);
    hsv[i*3] = hue;
    hsv[i*3+1] = sat;
    hsv[i*3+2] = val;
    gray[i] = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
  }
  
  // === Detector #2: Piel en tercio superior CENTRAL ===
  // Rango ESTRICTO: H 3-20 (tonos cálidos específicos, no incluye amarillo ni rojo puro)
  // S 40-130 (saturación media), V 100-210 (no muy oscuro ni muy claro)
  // Solo zona central horizontal (25-75% del ancho) para evitar bordes del álbum
  const topH = Math.floor(h / 3);
  const cxStart = Math.floor(w * 0.25);
  const cxEnd = Math.floor(w * 0.75);
  let skinCount = 0;
  let topCentralN = 0;
  const skinXs = [];
  const skinYs = [];
  const skinVs = [];
  for (let y = 0; y < topH; y++) {
    for (let x = cxStart; x < cxEnd; x++) {
      const i = y * w + x;
      const hue = hsv[i*3], sat = hsv[i*3+1], val = hsv[i*3+2];
      topCentralN++;
      if (hue >= 3 && hue <= 20 && sat >= 40 && sat <= 130 && val >= 100 && val <= 210) {
        skinCount++;
        skinXs.push(x);
        skinYs.push(y);
        skinVs.push(val);
      }
    }
  }
  const skinPct = topCentralN > 0 ? (skinCount / topCentralN) * 100 : 0;
  
  // Compacidad y validación de la zona piel
  let skinCompactness = 0;
  if (skinPct > 3 && skinXs.length > 10) {
    // Calcular desviación estándar normalizada
    const xMean = skinXs.reduce((a,b) => a+b, 0) / skinXs.length;
    const yMean = skinYs.reduce((a,b) => a+b, 0) / skinYs.length;
    const xVar = skinXs.reduce((a,b) => a + (b-xMean)*(b-xMean), 0) / skinXs.length;
    const yVar = skinYs.reduce((a,b) => a + (b-yMean)*(b-yMean), 0) / skinYs.length;
    const xStd = Math.sqrt(xVar) / Math.max(1, cxEnd - cxStart);
    const yStd = Math.sqrt(yVar) / Math.max(1, topH);
    const avgStd = (xStd + yStd) / 2;
    // Cluster compacto: avgStd < 0.30
    if (avgStd < 0.30) skinCompactness = 1.0 - avgStd;
    
    // Verificar gradientes de V (cara real tiene sombras; fondo plano no)
    const vMean = skinVs.reduce((a,b) => a+b, 0) / skinVs.length;
    const vVar = skinVs.reduce((a,b) => a + (b-vMean)*(b-vMean), 0) / skinVs.length;
    const vStd = Math.sqrt(vVar);
    if (vStd < 8) skinCompactness = 0;  // sin gradientes = fondo plano
    
    // Si más del 50% es "piel", es un fondo del color piel (no cara real)
    if (skinPct > 50) skinCompactness = 0;
  }
  
  // === Detector #3: Camiseta uniforme en mitad inferior ===
  const halfStart = Math.floor(h / 2);
  let sumS = 0, sumS2 = 0, nBot = 0;
  const hueBinsBot = new Array(18).fill(0);
  for (let y = halfStart; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const sat = hsv[i*3+1];
      sumS += sat;
      sumS2 += sat * sat;
      nBot++;
      if (sat > 40) {
        const bin = Math.min(17, Math.floor(hsv[i*3] / 10));
        hueBinsBot[bin]++;
      }
    }
  }
  const meanSBot = nBot > 0 ? sumS / nBot : 0;
  let maxBin = 0;
  for (let b = 1; b < 18; b++) if (hueBinsBot[b] > hueBinsBot[maxBin]) maxBin = b;
  const totalSat = hueBinsBot.reduce((a,b) => a+b, 0);
  const dominantHueRatio = totalSat > 0 ? hueBinsBot[maxBin] / totalSat : 0;
  const shirtUniform = (meanSBot > 80 && dominantHueRatio > 0.45) ? 1 : 0;
  const shirtSat = meanSBot;
  
  // === Detector #5: Histograma vertical (3 bandas) ===
  const band1End = Math.floor(h / 3);
  const band2End = Math.floor(2 * h / 3);
  const bandLimits = [[0, band1End], [band1End, band2End], [band2End, h]];
  const dominantBins = [];
  bandLimits.forEach(([start, end]) => {
    const bins = new Array(18).fill(0);
    for (let y = start; y < end; y++) {
      for (let x = 0; x < w; x++) {
        const i = y * w + x;
        if (hsv[i*3+1] > 40) {
          const bin = Math.min(17, Math.floor(hsv[i*3] / 10));
          bins[bin]++;
        }
      }
    }
    let mb = 0;
    for (let i = 1; i < 18; i++) if (bins[i] > bins[mb]) mb = i;
    const totalB = bins.reduce((a,b) => a+b, 0);
    dominantBins.push(totalB > 0 ? mb : -1);
  });
  
  function binDist(a, b) {
    if (a === -1 || b === -1) return 0;
    const d = Math.abs(a - b);
    return Math.min(d, 18 - d);
  }
  const verticalVariety = (binDist(dominantBins[0], dominantBins[1]) +
                           binDist(dominantBins[1], dominantBins[2])) / 2;
  
  // === Detectores VECTORIALES (Fase 3): formas, líneas, distribución de bordes ===
  // Calcular edges con Sobel simple (umbral 80)
  const edgeMap = new Uint8Array(w * h);
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const i = y * w + x;
      const gx = -gray[(y-1)*w+(x-1)] + gray[(y-1)*w+(x+1)]
                 -2*gray[y*w+(x-1)] + 2*gray[y*w+(x+1)]
                 -gray[(y+1)*w+(x-1)] + gray[(y+1)*w+(x+1)];
      const gyv = -gray[(y-1)*w+(x-1)] - 2*gray[(y-1)*w+x] - gray[(y-1)*w+(x+1)]
                  +gray[(y+1)*w+(x-1)] + 2*gray[(y+1)*w+x] + gray[(y+1)*w+(x+1)];
      const mag = Math.sqrt(gx*gx + gyv*gyv);
      if (mag > 80) edgeMap[i] = 1;
    }
  }
  
  // Detector A: distribución espacial de bordes (6x6 sub-bloques)
  // Foto real: bordes distribuidos. Hueco con texto/número: bordes concentrados.
  const subRows = 6, subCols = 6;
  const subH = Math.max(1, Math.floor(h / subRows));
  const subW = Math.max(1, Math.floor(w / subCols));
  const densities = [];
  for (let r = 0; r < subRows; r++) {
    for (let c = 0; c < subCols; c++) {
      let count = 0, total = 0;
      const yEnd = Math.min((r+1)*subH, h);
      const xEnd = Math.min((c+1)*subW, w);
      for (let y = r*subH; y < yEnd; y++) {
        for (let x = c*subW; x < xEnd; x++) {
          total++;
          if (edgeMap[y*w + x]) count++;
        }
      }
      if (total > 0) densities.push(count / total);
    }
  }
  let densMean = 0;
  densities.forEach(d => densMean += d);
  densMean /= Math.max(1, densities.length);
  let densVar = 0;
  densities.forEach(d => densVar += (d - densMean) * (d - densMean));
  densVar /= Math.max(1, densities.length);
  const edgeConcentration = Math.sqrt(densVar) / (densMean + 0.001);
  
  // Detector B: contar "líneas largas" (segmentos rectos de ≥10 píxeles continuos)
  // Versión simple: para cada píxel con borde, ver cuántos vecinos colineales tiene
  // Implementación: contar segmentos horizontales y verticales con >10 píxeles continuos
  let longLines = 0;
  // Horizontales
  for (let y = 0; y < h; y++) {
    let run = 0;
    for (let x = 0; x < w; x++) {
      if (edgeMap[y*w + x]) {
        run++;
      } else {
        if (run >= 10) longLines++;
        run = 0;
      }
    }
    if (run >= 10) longLines++;
  }
  // Verticales
  for (let x = 0; x < w; x++) {
    let run = 0;
    for (let y = 0; y < h; y++) {
      if (edgeMap[y*w + x]) {
        run++;
      } else {
        if (run >= 10) longLines++;
        run = 0;
      }
    }
    if (run >= 10) longLines++;
  }
  // Diagonales (45° y 135°) - simplificado
  const diag1 = Math.min(w, h);
  for (let start = 0; start < w + h - 1; start++) {
    let run = 0;
    for (let i = 0; i < diag1; i++) {
      const x = start - i;
      const y = i;
      if (x < 0 || x >= w || y >= h) {
        if (run >= 10) longLines++;
        run = 0;
        continue;
      }
      if (edgeMap[y*w + x]) {
        run++;
      } else {
        if (run >= 10) longLines++;
        run = 0;
      }
    }
    if (run >= 10) longLines++;
  }
  
  // Normalizar por área (líneas por 1000 píxeles)
  const linesPerKpx = longLines / Math.max(1, (h * w) / 1000);
  
  // === Detector "número grande decorativo" (Fase 4 - centerColorDominance) ===
  // % del centro (20-80%) ocupado por EL color más dominante (cuantizado)
  // Lámina pegada: foto compleja con muchos colores → cdom < 25
  // Hueco vacío: número decorativo gigante de UN color → cdom > 40
  const cdomStartX = Math.floor(w * 0.20);
  const cdomEndX = Math.floor(w * 0.80);
  const cdomStartY = Math.floor(h * 0.20);
  const cdomEndY = Math.floor(h * 0.80);
  // Cuantizar HSV en bins: 18 H × 4 S × 4 V = 288 bins posibles
  const cdomBins = new Map();
  for (let y = cdomStartY; y < cdomEndY; y++) {
    for (let x = cdomStartX; x < cdomEndX; x++) {
      const i = y * w + x;
      const hb = Math.floor(hsv[i*3] / 10);
      const sb = Math.floor(hsv[i*3+1] / 64);
      const vb = Math.floor(hsv[i*3+2] / 64);
      const key = hb * 16 + sb * 4 + vb;
      cdomBins.set(key, (cdomBins.get(key) || 0) + 1);
    }
  }
  let cdomMax = 0;
  let cdomTotal = 0;
  cdomBins.forEach(v => {
    cdomTotal += v;
    if (v > cdomMax) cdomMax = v;
  });
  const centerDom = cdomTotal > 0 ? (cdomMax / cdomTotal) * 100 : 0;
  
  return {
    skinPct: skinPct,
    skinCompact: skinCompactness,
    shirtUniform: shirtUniform,
    shirtSat: shirtSat,
    verticalVariety: verticalVariety,
    dominantBins: dominantBins,
    edgeConcentration: edgeConcentration,
    linesPerKpx: linesPerKpx,
    centerDom: centerDom
  };
}

function analyzeCell(imgData) {
  const data = imgData.data;
  const w = imgData.width;
  const h = imgData.height;
  // Crop más agresivo al centro: 22% de margen (antes era 15%)
  // Esto evita los bordes donde está impreso "XXX N" en huecos vacíos
  const marginX = Math.floor(w * 0.22);
  const marginY = Math.floor(h * 0.22);
  const innerW = w - 2 * marginX;
  const innerH = h - 2 * marginY;
  if (innerW < 10 || innerH < 10) return { sat:0, cian:0, std:0, edges:0, lapl:0, hueDiv:0 };

  let sumSat=0, cianCount=0, sumGray=0, sumGray2=0, innerCount=0;
  const grayBuf = new Float32Array(innerW * innerH);
  // Histograma de hue (18 bins, cada uno cubre 10° de matiz, total 180°)
  // Solo cuenta píxeles con saturación > 40 (los grises/blancos no aportan info de matiz)
  const hueHist = new Array(18).fill(0);
  let hueCount = 0;

  for (let py=0; py<innerH; py++) {
    for (let px=0; px<innerW; px++) {
      const x = px + marginX, y = py + marginY;
      const idx = (y * w + x) * 4;
      const r = data[idx], g = data[idx+1], b = data[idx+2];
      const [hue, sat, val] = rgbToHsv(r, g, b);
      sumSat += sat;
      if (hue >= 85 && hue <= 110 && sat > 70 && val > 120) cianCount++;
      // Histograma de matiz (solo píxeles con saturación significativa)
      if (sat > 40) {
        const bin = Math.min(17, Math.floor(hue / 10));
        hueHist[bin]++;
        hueCount++;
      }
      const gray = 0.299*r + 0.587*g + 0.114*b;
      sumGray += gray;
      sumGray2 += gray*gray;
      grayBuf[py*innerW + px] = gray;
      innerCount++;
    }
  }
  const meanGray = sumGray/innerCount;
  const variance = sumGray2/innerCount - meanGray*meanGray;
  const stdGray = Math.sqrt(Math.max(0, variance));
  const meanSat = sumSat/innerCount;
  const cianPct = (cianCount/innerCount)*100;
  
  // hueDiversity: cuántos bins del histograma de matiz tienen >5% del total
  // Vacío con fondo de color uniforme = 1 (un solo color domina)
  // Lámina pegada (cara + camiseta + fondo) = 3+ matices distintos
  let hueDiv = 0;
  if (hueCount > 0) {
    for (let i = 0; i < 18; i++) {
      if (hueHist[i] / hueCount > 0.05) hueDiv++;
    }
  }

  let sumLapl=0, sumLapl2=0, laplCount=0;
  for (let py=1; py<innerH-1; py++) {
    for (let px=1; px<innerW-1; px++) {
      const c = grayBuf[py*innerW + px];
      const up = grayBuf[(py-1)*innerW + px];
      const down = grayBuf[(py+1)*innerW + px];
      const left = grayBuf[py*innerW + (px-1)];
      const right = grayBuf[py*innerW + (px+1)];
      const lapl = up+down+left+right - 4*c;
      sumLapl += lapl;
      sumLapl2 += lapl*lapl;
      laplCount++;
    }
  }
  const meanLapl = sumLapl/laplCount;
  const laplVar = sumLapl2/laplCount - meanLapl*meanLapl;

  let edgesCount = 0;
  for (let py=1; py<innerH-1; py++) {
    for (let px=1; px<innerW-1; px++) {
      const gx = -grayBuf[(py-1)*innerW+(px-1)] + grayBuf[(py-1)*innerW+(px+1)]
                 -2*grayBuf[py*innerW+(px-1)] + 2*grayBuf[py*innerW+(px+1)]
                 -grayBuf[(py+1)*innerW+(px-1)] + grayBuf[(py+1)*innerW+(px+1)];
      const gy = -grayBuf[(py-1)*innerW+(px-1)] - 2*grayBuf[(py-1)*innerW+px] - grayBuf[(py-1)*innerW+(px+1)]
                 +grayBuf[(py+1)*innerW+(px-1)] + 2*grayBuf[(py+1)*innerW+px] + grayBuf[(py+1)*innerW+(px+1)];
      const mag = Math.sqrt(gx*gx + gy*gy);
      if (mag > 100) edgesCount++;
    }
  }
  const edgesPct = (edgesCount/laplCount)*100;
  return { sat: meanSat, cian: cianPct, std: stdGray, edges: edgesPct, lapl: laplVar, hueDiv: hueDiv };
}

function decideCell(m, tipo) {
  let veredicto = 'Me falta', confianza = 'media', razon = '';
  const hueDiv = m.hueDiv || 0;
  const bgMatch = m.bgMatch || 0;
  const skinPct = m.skinPct || 0;
  const skinCompact = m.skinCompact || 0;
  const centerDom = m.centerDom || 0;
  
  // Cara real: piel COMPACTA con gradientes
  // (subido: skinPct > 7 era 5, skinCompact > 0.55 era 0.5 — más estricto)
  const caraReal = skinPct > 7 && skinCompact > 0.55;
  
  // ============== OVERRIDES POR centerDom (Fase 4) ==============
  // Resuelven casos donde el hueco tiene número grande + fondo decorativo del país
  
  if (tipo === 'Jugador') {
    // ⚡ Hueco con número decorativo grande: un color domina el centro,
    // NO hay cara real, y el detalle es moderado (no foto compleja)
    // Bajado threshold de centerDom 40→35 para capturar más huecos
    if (centerDom > 35 && !caraReal && m.lapl < 400) {
      return { veredicto: 'Me falta', confianza: 'alta', razon: 'cdom=' + centerDom.toFixed(0) + ',sin-cara' };
    }
    
    // ⚡ Adicional: si centerDom es muy alto (>50), es casi seguro hueco aunque haya algo de "piel"
    // (la decoración del álbum puede dar falsos positivos de skin)
    if (centerDom > 50 && skinCompact < 0.7) {
      return { veredicto: 'Me falta', confianza: 'alta', razon: 'cdom-muy-alto=' + centerDom.toFixed(0) };
    }
    
    // ⚡ Lámina segura: cara compacta + centro variado (muchos colores en la foto)
    if (caraReal && centerDom < 25) {
      return { veredicto: 'Tengo', confianza: 'alta', razon: 'cara+cdom-bajo' };
    }
  }
  
  // ============== LÓGICA PRINCIPAL (base 92%) ==============
  if (tipo === 'Jugador') {
    if (hueDiv <= 2 && m.lapl < 350) {
      veredicto = 'Me falta';
      confianza = hueDiv <= 1 ? 'alta' : 'media';
      razon = 'huedi=' + hueDiv + ',lapl=' + Math.round(m.lapl);
    }
    else if (hueDiv >= 4 && m.lapl > 300) {
      veredicto = 'Tengo'; confianza = 'alta'; razon = 'huedi+lapl';
    }
    else if (m.lapl > 500) {
      veredicto = 'Tengo'; confianza = 'alta'; razon = 'lapl-alto';
    }
    else if (m.lapl < 150 && m.sat < 80) {
      veredicto = 'Me falta'; confianza = 'alta'; razon = 'lapl+sat-bajo';
    }
    else if (m.cian > 15 && hueDiv >= 3) {
      veredicto = 'Tengo'; confianza = 'alta'; razon = 'cian';
    }
    else {
      let score = 0;
      if (m.lapl > 350) score += 25;
      else if (m.lapl > 250) score += 15;
      if (hueDiv >= 4) score += 30;
      else if (hueDiv >= 3) score += 18;
      else if (hueDiv <= 1) score -= 25;
      if (m.sat > 110) score += 18;
      if (m.edges > 11) score += 15;
      if (m.cian > 8) score += 12;
      // PENALIZACIÓN por centerDom alto (señal de hueco con decoración)
      if (centerDom > 30) score -= 15;
      if (centerDom > 40) score -= 10;  // adicional acumulativo
      // Threshold subido 55 → 60 (más conservador para marcar "Tengo")
      veredicto = score >= 60 ? 'Tengo' : 'Me falta';
      confianza = 'media';
      razon = 'score=' + score + ',cdom=' + centerDom.toFixed(0);
    }
  } else if (tipo === 'Escudo') {
    if (hueDiv >= 3 && m.lapl > 250) {
      veredicto = 'Tengo'; confianza = 'alta'; razon = 'escudo-multi';
    }
    else if (m.lapl > 400) {
      veredicto = 'Tengo'; confianza = 'alta'; razon = 'escudo-lapl-alto';
    }
    else if (hueDiv <= 2 && m.lapl < 350) {
      veredicto = 'Me falta'; confianza = 'alta'; razon = 'escudo-uniforme';
    }
    else if (m.lapl < 200) {
      veredicto = 'Me falta'; confianza = 'alta'; razon = 'escudo-lapl-bajo';
    }
    else if (hueDiv >= 4 && m.sat > 60) {
      veredicto = 'Tengo'; confianza = 'media'; razon = 'multicolor';
    }
    else {
      veredicto = 'Me falta'; confianza = 'media'; razon = 'escudo-default';
    }
  } else if (tipo === 'Plantel') {
    if (m.lapl > 600 || (m.edges > 18 && hueDiv >= 4)) {
      veredicto = 'Tengo'; confianza = 'alta'; razon = 'foto-equipo';
    }
    else if (hueDiv >= 5) {
      veredicto = 'Tengo'; confianza = 'alta'; razon = 'plantel-multi';
    }
    else if (m.lapl < 200 || hueDiv <= 2) {
      veredicto = 'Me falta'; confianza = 'alta'; razon = 'plantel-uniforme';
    }
    else {
      veredicto = 'Me falta'; confianza = 'media'; razon = 'plantel-default';
    }
  }
  
  return { veredicto, confianza, razon };
}

// Dentro del rectángulo, las láminas están en posiciones normalizadas u,v ∈ [0,1]

const LAM_H = ROW_H * LAM_H_FRAC;
