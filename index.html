document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    const img = new Image();
    img.onload = () => {
      // Auto-rotación: si la foto es vertical (más alta que ancha),
      // la rotamos 90° para que quede horizontal (un álbum abierto es horizontal)
      let needsRotation = img.height > img.width;
      let initialRotation = needsRotation ? 90 : 0;
      
      processImage(img, initialRotation);
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function processImage(originalImg, rotation) {
  // Aplicar rotación
  let w = originalImg.width;
  let h = originalImg.height;
  
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  
  if (rotation === 90 || rotation === 270) {
    canvas.width = h;
    canvas.height = w;
  } else {
    canvas.width = w;
    canvas.height = h;
  }
  
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.rotate((rotation * Math.PI) / 180);
  ctx.drawImage(originalImg, -w / 2, -h / 2);
  
  // Reducir tamaño si es muy grande
  const maxDim = 1600;
  let finalW = canvas.width;
  let finalH = canvas.height;
  if (finalW > maxDim || finalH > maxDim) {
    if (finalW > finalH) {
      finalH = Math.round(finalH * maxDim / finalW);
      finalW = maxDim;
    } else {
      finalW = Math.round(finalW * maxDim / finalH);
      finalH = maxDim;
    }
    const resizeCanvas = document.createElement('canvas');
    resizeCanvas.width = finalW;
    resizeCanvas.height = finalH;
    resizeCanvas.getContext('2d').drawImage(canvas, 0, 0, finalW, finalH);
    canvas.width = finalW;
    canvas.height = finalH;
    canvas.getContext('2d').drawImage(resizeCanvas, 0, 0);
  }
  
  const resizedImg = new Image();
  resizedImg.onload = () => {
    ScanState.imageObject = resizedImg;
    ScanState.imageWidth = finalW;
    ScanState.imageHeight = finalH;
    ScanState.rotation = rotation;
    
    // Inicializar marcos con auto-detección
    initFrames();
    
    ScanState.view = { zoom: 1, offsetX: 0, offsetY: 0 };
    ScanState.step = 'calibrate';
    renderScanStep();
  };
  resizedImg.src = canvas.toDataURL('image/jpeg', 0.9);
}

  try {

        ScanState.leftFrame = {

        };

        };

// =============================================================
// Mapeo bilineal: (u,v) en marco normalizado → (x,y) en imagen
// =============================================================
function uvToImageCoords(frame, u, v) {
  if (!frame) return { x: 0, y: 0 };
  const leftX  = frame.TL.x + (frame.BL.x - frame.TL.x) * v;
  const leftY  = frame.TL.y + (frame.BL.y - frame.TL.y) * v;
  const rightX = frame.TR.x + (frame.BR.x - frame.TR.x) * v;
  const rightY = frame.TR.y + (frame.BR.y - frame.TR.y) * v;
  return {
    x: leftX + (rightX - leftX) * u,
    y: leftY + (rightY - leftY) * u
  };
}

function rotateCurrentImage() {
  const img = ScanState.imageObject;
  if (!img) return;
  const canvas = document.createElement('canvas');
  canvas.width = img.height;
  canvas.height = img.width;
  const ctx = canvas.getContext('2d');
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.rotate(Math.PI / 2);
  ctx.drawImage(img, -img.width / 2, -img.height / 2);
  
  const newImg = new Image();
  newImg.onload = () => {
    ScanState.imageObject = newImg;
    ScanState.imageWidth = newImg.width;
    ScanState.imageHeight = newImg.height;
    ScanState.rotation = (ScanState.rotation + 90) % 360;
    // Rotar los marcos junto con la imagen
    if (ScanState.leftFrame) ScanState.leftFrame = rotateFrame90CW(ScanState.leftFrame);
    if (ScanState.rightFrame) ScanState.rightFrame = rotateFrame90CW(ScanState.rightFrame);
    // Resetear el zoom/pan para evitar quedar mirando un lugar incorrecto
    ScanState.view = { zoom: 1, offsetX: 0, offsetY: 0 };
    drawCalibCanvas();
  };
  newImg.src = canvas.toDataURL('image/jpeg', 0.9);
}

// Rota un marco 90° en sentido horario.
// Coordenadas normalizadas (0-1) de imagen original → imagen rotada 90° CW: (x, y) → (1-y, x)
// Las etiquetas TL/TR/BR/BL se reasignan para mantener su significado en la imagen rotada:
//   BL → TL, TL → TR, TR → BR, BR → BL
function rotateFrame90CW(frame) {
  return {
    TL: { x: 1 - frame.BL.y, y: frame.BL.x },
    TR: { x: 1 - frame.TL.y, y: frame.TL.x },
    BR: { x: 1 - frame.TR.y, y: frame.TR.x },
    BL: { x: 1 - frame.BR.y, y: frame.BR.x },
    layoutRotation: ((frame.layoutRotation || 0) + 90) % 360
  };
}

// Transforma coordenadas (u, v) y dimensiones (w, h) del layout interno
// según la rotación del layout. Retorna las coords adaptadas a la rotación actual.
function applyLayoutRotation(u, v, w, h, rotation) {
  let nu = u, nv = v, nw = w, nh = h;
  if (rotation === 90) {
    // (u, v) → (1 - v, u), y w↔h
    nu = 1 - v;
    nv = u;
    nw = h;
    nh = w;
  } else if (rotation === 180) {
    nu = 1 - u;
    nv = 1 - v;
    // w, h igual
  } else if (rotation === 270) {
    nu = v;
    nv = 1 - u;
    nw = h;
    nh = w;
  }
  return { u: nu, v: nv, w: nw, h: nh };
}

function isVerticalAfterRotation(originallyVertical, rotation) {
  if (rotation === 90 || rotation === 270) return !originallyVertical;
  return originallyVertical;
}

function updateZoomIndicator() {
  const ind = document.getElementById('zoomIndicator');
  if (ind) ind.textContent = Math.round(ScanState.view.zoom * 100) + '%';
}

function zoomAt(factor, canvasX, canvasY) {
  const canvas = document.getElementById('calibCanvas');
  if (!canvas) return;
  if (canvasX === null) canvasX = canvas.width / 2;
  if (canvasY === null) canvasY = canvas.height / 2;
  
  const imgX_before = (canvasX - ScanState.view.offsetX) / ScanState.view.zoom;
  const imgY_before = (canvasY - ScanState.view.offsetY) / ScanState.view.zoom;
  
  const newZoom = Math.max(1, Math.min(8, ScanState.view.zoom * factor));
  ScanState.view.zoom = newZoom;
  ScanState.view.offsetX = canvasX - imgX_before * newZoom;
  ScanState.view.offsetY = canvasY - imgY_before * newZoom;
  
  clampView();
  updateZoomIndicator();
  drawCalibCanvas();
}

function clampView() {
  const canvas = document.getElementById('calibCanvas');
  if (!canvas) return;
  const cw = canvas.width;
  const ch = canvas.height;
  const scaledW = cw * ScanState.view.zoom;
  const scaledH = ch * ScanState.view.zoom;
  if (scaledW > cw) {
    ScanState.view.offsetX = Math.min(0, Math.max(cw - scaledW, ScanState.view.offsetX));
  } else {
    ScanState.view.offsetX = (cw - scaledW) / 2;
  }
  if (scaledH > ch) {
    ScanState.view.offsetY = Math.min(0, Math.max(ch - scaledH, ScanState.view.offsetY));
  } else {
    ScanState.view.offsetY = (ch - scaledH) / 2;
  }
}

function attachCanvasInteraction() {
  const canvas = document.getElementById('calibCanvas');
  const HIT_RADIUS_PX = Math.max(60, canvas.width * 0.05);
  
  function getCanvasPos(touch) {
    const rect = canvas.getBoundingClientRect();
    // El canvas usa object-fit:contain, así que la imagen real ocupa
    // una sub-región dentro del rect (con posible letterboxing)
    const canvasAR = canvas.width / canvas.height;
    const rectAR = rect.width / rect.height;
    let visibleW, visibleH, offsetX, offsetY;
    if (canvasAR > rectAR) {
      // Canvas más ancho: limita el ancho, sobra alto arriba/abajo
      visibleW = rect.width;
      visibleH = rect.width / canvasAR;
      offsetX = 0;
      offsetY = (rect.height - visibleH) / 2;
    } else {
      // Canvas más alto: limita el alto, sobra ancho a los lados
      visibleH = rect.height;
      visibleW = rect.height * canvasAR;
      offsetX = (rect.width - visibleW) / 2;
      offsetY = 0;
    }
    // Convertir del touch (en CSS coords) al área visible del canvas, luego escalar
    const relX = (touch.clientX - rect.left - offsetX) / visibleW;
    const relY = (touch.clientY - rect.top - offsetY) / visibleH;
    return {
      x: relX * canvas.width,
      y: relY * canvas.height
    };
  }
  
  // Buscar la esquina más cercana entre los 2 marcos (8 esquinas total)
  function findNearbyCorner(cx, cy) {
    const cornerNames = ['TL', 'TR', 'BR', 'BL'];
    let closestFrame = null;
    let closestIdx = -1;
    let closestDist = HIT_RADIUS_PX;
    
    [['left', ScanState.leftFrame], ['right', ScanState.rightFrame]].forEach(([frameName, frame]) => {
      if (!frame) return;
      for (let i = 0; i < 4; i++) {
        const pt = frame[cornerNames[i]];
        const ptCanvasX = pt.x * canvas.width * ScanState.view.zoom + ScanState.view.offsetX;
        const ptCanvasY = pt.y * canvas.height * ScanState.view.zoom + ScanState.view.offsetY;
        const dx = ptCanvasX - cx;
        const dy = ptCanvasY - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < closestDist) {
          closestDist = dist;
          closestIdx = i;
          closestFrame = frameName;
        }
      }
    });
    
    return { frame: closestFrame, idx: closestIdx };
  }
  
  function distance(t1, t2) {
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  
  function onTouchStart(e) {
    if (e.preventDefault) e.preventDefault();
    const touches = e.touches || [{ clientX: e.clientX, clientY: e.clientY }];
    
    if (touches.length === 2) {
      const t1 = touches[0], t2 = touches[1];
      const dist = distance(t1, t2);
      // Usar getCanvasPos para que respete object-fit:contain
      const centerTouch = { clientX: (t1.clientX + t2.clientX) / 2, clientY: (t1.clientY + t2.clientY) / 2 };
      const centerPos = getCanvasPos(centerTouch);
      ScanState.gesture = { type: 'pinch', startDist: dist, startZoom: ScanState.view.zoom, centerX: centerPos.x, centerY: centerPos.y };
    } else if (touches.length === 1) {
      const pos = getCanvasPos(touches[0]);
      const near = findNearbyCorner(pos.x, pos.y);
      if (near.frame) {
        ScanState.gesture = { type: 'drag-corner', frame: near.frame, cornerIdx: near.idx };
      } else {
        ScanState.gesture = { 
          type: 'pan', 
          startX: pos.x, startY: pos.y, 
          startOffX: ScanState.view.offsetX, 
          startOffY: ScanState.view.offsetY 
        };
      }
    }
  }
  
  function onTouchMove(e) {
    if (!ScanState.gesture) return;
    if (e.preventDefault) e.preventDefault();
    const touches = e.touches || [{ clientX: e.clientX, clientY: e.clientY }];
    
    if (ScanState.gesture.type === 'pinch' && touches.length === 2) {
      const dist = distance(touches[0], touches[1]);
      const factor = dist / ScanState.gesture.startDist;
      const newZoom = Math.max(1, Math.min(8, ScanState.gesture.startZoom * factor));
      const oldZoom = ScanState.view.zoom;
      const cx = ScanState.gesture.centerX;
      const cy = ScanState.gesture.centerY;
      const imgX = (cx - ScanState.view.offsetX) / oldZoom;
      const imgY = (cy - ScanState.view.offsetY) / oldZoom;
      ScanState.view.zoom = newZoom;
      ScanState.view.offsetX = cx - imgX * newZoom;
      ScanState.view.offsetY = cy - imgY * newZoom;
      clampView();
      updateZoomIndicator();
      drawCalibCanvas();
    } else if (touches.length === 1) {
      const pos = getCanvasPos(touches[0]);
      
      if (ScanState.gesture.type === 'drag-corner') {
        const imgX = (pos.x - ScanState.view.offsetX) / ScanState.view.zoom / canvas.width;
        const imgY = (pos.y - ScanState.view.offsetY) / ScanState.view.zoom / canvas.height;
        const cornerNames = ['TL', 'TR', 'BR', 'BL'];
        const k = cornerNames[ScanState.gesture.cornerIdx];
        const frameRef = ScanState.gesture.frame === 'left' ? ScanState.leftFrame : ScanState.rightFrame;
        frameRef[k] = { 
          x: Math.max(0, Math.min(1, imgX)), 
          y: Math.max(0, Math.min(1, imgY)) 
        };
        drawCalibCanvas();
      } else if (ScanState.gesture.type === 'pan') {
        ScanState.view.offsetX = ScanState.gesture.startOffX + (pos.x - ScanState.gesture.startX);
        ScanState.view.offsetY = ScanState.gesture.startOffY + (pos.y - ScanState.gesture.startY);
        clampView();
        drawCalibCanvas();
      }
    }
  }
  
  function onTouchEnd(e) {
    ScanState.gesture = null;
  }
  
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd);
  canvas.addEventListener('touchcancel', onTouchEnd);
  canvas.addEventListener('mousedown', onTouchStart);
  canvas.addEventListener('mousemove', (e) => { if (ScanState.gesture) onTouchMove(e); });
  canvas.addEventListener('mouseup', onTouchEnd);
  canvas.addEventListener('mouseleave', () => { if (ScanState.gesture) onTouchEnd({}); });
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const pos = getCanvasPos({ clientX: e.clientX, clientY: e.clientY });
    zoomAt(e.deltaY < 0 ? 1.2 : 1/1.2, pos.x, pos.y);
  }, { passive: false });
}

function drawCalibCanvas() {
  const canvas = document.getElementById('calibCanvas');
  if (!canvas || !ScanState.imageObject) return;
  
  if (canvas.width !== ScanState.imageWidth) {
    canvas.width = ScanState.imageWidth;
    canvas.height = ScanState.imageHeight;
  }
  
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.save();
  ctx.translate(ScanState.view.offsetX, ScanState.view.offsetY);
  ctx.scale(ScanState.view.zoom, ScanState.view.zoom);
  ctx.drawImage(ScanState.imageObject, 0, 0);
  ctx.restore();
  
  // Dibujar marco izquierdo
  if (ScanState.leftFrame) {
    drawFrame(ctx, ScanState.leftFrame, PAGE_LEFT_LAYOUT, PAGE_LEFT_DECOR, 'L', '#0066CC');
  }
  // Dibujar marco derecho
  if (ScanState.rightFrame) {
    drawFrame(ctx, ScanState.rightFrame, PAGE_RIGHT_LAYOUT, PAGE_RIGHT_DECOR, 'R', '#E91E63');
  }
}

function drawFrame(ctx, frame, layout, decor, framePrefix, frameColor) {
  const W = ctx.canvas.width;
  const H = ctx.canvas.height;
  const zoom = ScanState.view.zoom;
  const offX = ScanState.view.offsetX;
  const offY = ScanState.view.offsetY;
  
  function toCanvas(uvPos) {
    return {
      x: uvPos.x * W * zoom + offX,
      y: uvPos.y * H * zoom + offY
    };
  }
  
  // Borde del marco trapezoidal
  const cTL = toCanvas(frame.TL);
  const cTR = toCanvas(frame.TR);
  const cBR = toCanvas(frame.BR);
  const cBL = toCanvas(frame.BL);
  
  ctx.beginPath();
  ctx.moveTo(cTL.x, cTL.y);
  ctx.lineTo(cTR.x, cTR.y);
  ctx.lineTo(cBR.x, cBR.y);
  ctx.lineTo(cBL.x, cBL.y);
  ctx.closePath();
  ctx.strokeStyle = frameColor;
  ctx.lineWidth = 4;
  ctx.stroke();
  
  const rotation = frame.layoutRotation || 0;
  
  // Zonas decorativas (no son láminas) → marcas grises punteadas
  decor.forEach(dOrig => {
    const d = applyLayoutRotation(dOrig.u, dOrig.v, dOrig.w, dOrig.h, rotation);
    d.label = dOrig.label;
    const hw = d.w / 2;
    const hh = d.h / 2;
    const corners = [
      uvToImageCoords(frame, d.u - hw, d.v - hh),
      uvToImageCoords(frame, d.u + hw, d.v - hh),
      uvToImageCoords(frame, d.u + hw, d.v + hh),
      uvToImageCoords(frame, d.u - hw, d.v + hh),
    ];
    const cv = corners.map(toCanvas);
    ctx.beginPath();
    ctx.moveTo(cv[0].x, cv[0].y);
    ctx.lineTo(cv[1].x, cv[1].y);
    ctx.lineTo(cv[2].x, cv[2].y);
    ctx.lineTo(cv[3].x, cv[3].y);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
    
    const center = toCanvas(uvToImageCoords(frame, d.u, d.v));
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = 'bold ' + Math.max(11, W * 0.011) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.label, center.x, center.y);
  });
  
  // Cada lámina como rectángulo verde
  layout.forEach(lamOrig => {
    const lam = applyLayoutRotation(lamOrig.u, lamOrig.v, lamOrig.w, lamOrig.h, rotation);
    lam.n = lamOrig.n;
    lam.tipo = lamOrig.tipo;
    const halfW = lam.w / 2;
    const halfH = lam.h / 2;
    const corners = [
      uvToImageCoords(frame, lam.u - halfW, lam.v - halfH),
      uvToImageCoords(frame, lam.u + halfW, lam.v - halfH),
      uvToImageCoords(frame, lam.u + halfW, lam.v + halfH),
      uvToImageCoords(frame, lam.u - halfW, lam.v + halfH),
    ];
    const cv = corners.map(toCanvas);
    
    ctx.beginPath();
    ctx.moveTo(cv[0].x, cv[0].y);
    ctx.lineTo(cv[1].x, cv[1].y);
    ctx.lineTo(cv[2].x, cv[2].y);
    ctx.lineTo(cv[3].x, cv[3].y);
    ctx.closePath();
    
    if (lam.tipo === 'Escudo') {
      ctx.fillStyle = 'rgba(255, 107, 26, 0.20)';
      ctx.strokeStyle = '#FF6B1A';
    } else if (lam.tipo === 'Plantel') {
      ctx.fillStyle = 'rgba(107, 63, 160, 0.25)';
      ctx.strokeStyle = '#6B3FA0';
    } else {
      ctx.fillStyle = 'rgba(0, 176, 79, 0.18)';
      ctx.strokeStyle = '#00B04F';
    }
    ctx.fill();
    ctx.lineWidth = 4.5;
    ctx.stroke();
    
    const center = toCanvas(uvToImageCoords(frame, lam.u, lam.v));
    const fontSize = Math.max(14, W * 0.014);
    ctx.font = 'bold ' + fontSize + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const text = '#' + lam.n;
    const textW = ctx.measureText(text).width;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.78)';
    ctx.fillRect(center.x - textW/2 - 5, center.y - fontSize/2 - 3, textW + 10, fontSize + 6);
    ctx.fillStyle = '#00FF7F';
    ctx.fillText(text, center.x, center.y);
  });
  
  // Esquinas del marco
  const cornerNames = ['TL', 'TR', 'BR', 'BL'];
  cornerNames.forEach((name, idx) => {
    const pt = frame[name];
    const cx = pt.x * W * zoom + offX;
    const cy = pt.y * H * zoom + offY;
    const r = Math.max(22, W * 0.022);
    
    ctx.fillStyle = '#FFC72C';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = frameColor;
    ctx.lineWidth = 4;
    ctx.stroke();
    
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold ' + Math.round(r * 0.55) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(framePrefix + (idx + 1), cx, cy);
  });
}

// =============================================================
// Cálculo de celdas
// =============================================================
function calculateCells() {
  const cells = [];
  if (!ScanState.leftFrame || !ScanState.rightFrame) return cells;
  
  const leftRot = ScanState.leftFrame.layoutRotation || 0;
  const rightRot = ScanState.rightFrame.layoutRotation || 0;
  
  // Calcula el AABB (axis-aligned bounding box) del cuadrilátero formado
  // por las 4 esquinas de la lámina (transformadas bilinealmente por el marco)
  function addCell(frame, lamOrig, rotation) {
    const lam = applyLayoutRotation(lamOrig.u, lamOrig.v, lamOrig.w, lamOrig.h, rotation);
    const hw = lam.w / 2;
    const hh = lam.h / 2;
    const tl = uvToImageCoords(frame, lam.u - hw, lam.v - hh);
    const tr = uvToImageCoords(frame, lam.u + hw, lam.v - hh);
    const br = uvToImageCoords(frame, lam.u + hw, lam.v + hh);
    const bl = uvToImageCoords(frame, lam.u - hw, lam.v + hh);
    const minX = Math.min(tl.x, tr.x, br.x, bl.x);
    const maxX = Math.max(tl.x, tr.x, br.x, bl.x);
    const minY = Math.min(tl.y, tr.y, br.y, bl.y);
    const maxY = Math.max(tl.y, tr.y, br.y, bl.y);
    cells.push({
      n: lamOrig.n,
      tipo: lamOrig.tipo,
      cx: (minX + maxX) / 2,
      cy: (minY + maxY) / 2,
      halfW: (maxX - minX) / 2,
      halfH: (maxY - minY) / 2,
      frameRotation: rotation  // para desrotar el crop a su orientación natural
    });
  }
  
  PAGE_LEFT_LAYOUT.forEach(lamOrig => addCell(ScanState.leftFrame, lamOrig, leftRot));
  PAGE_RIGHT_LAYOUT.forEach(lamOrig => addCell(ScanState.rightFrame, lamOrig, rightRot));
  
  return cells;
}

// =============================================================
// Análisis
// =============================================================
async function analyzePage() {
  try {
    if (!ScanState.imageObject) throw new Error('No hay imagen cargada');
    
    const img = ScanState.imageObject;
    const sourceCanvas = document.createElement('canvas');
    sourceCanvas.width = img.width;
    sourceCanvas.height = img.height;
    const sctx = sourceCanvas.getContext('2d');
    sctx.drawImage(img, 0, 0);
    
    // === FASE 1: Calibrar colores de fondo del álbum por página ===
    // Las zonas WE_ARE (izq) y GRUPO (der) muestran el color/patrón
    // característico del equipo. Las usamos como referencia para detectar huecos.
    const albumColors = calibrateAlbumColors(sctx, img);
    console.log('Album colors auto-calibrados:', albumColors);
    // Guardar para validar país al aplicar
    ScanState.measuredAlbumColor = albumColors.right;
    // Calcular fingerprint multi-zona para validación robusta de país
    ScanState.measuredFp = calculateFingerprint(sctx, img);
    
    const cells = calculateCells();
    const results = [];
    
    for (let i = 0; i < cells.length; i++) {
      const cell = cells[i];
      document.getElementById('analyzeProgress').textContent = 'Lámina ' + (i + 1) + ' de ' + cells.length + '...';
      await new Promise(r => setTimeout(r, 0));
      
      if (!isFinite(cell.cx) || !isFinite(cell.cy) || !isFinite(cell.halfW) || !isFinite(cell.halfH)) {
        results.push({ ...cell, detect: 'Me falta', confidence: 'media', cellImage: null, metrics: null });
        continue;
      }
      
      const cxPx = cell.cx * img.width;
      const cyPx = cell.cy * img.height;
      const hwPx = Math.abs(cell.halfW * img.width);
      const hhPx = Math.abs(cell.halfH * img.height);
      
      let x = Math.round(cxPx - hwPx);
      let y = Math.round(cyPx - hhPx);
      let w = Math.round(hwPx * 2);
      let h = Math.round(hhPx * 2);
      
      if (x < 0) { w += x; x = 0; }
      if (y < 0) { h += y; y = 0; }
      if (x + w > img.width) w = img.width - x;
      if (y + h > img.height) h = img.height - y;
      
      if (!isFinite(x) || !isFinite(y) || !isFinite(w) || !isFinite(h) || w < 20 || h < 20 || x < 0 || y < 0 || x >= img.width || y >= img.height) {
        results.push({ ...cell, detect: 'Me falta', confidence: 'media', cellImage: null, metrics: null });
        continue;
      }
      
      let imgData;
      try {
        imgData = sctx.getImageData(x, y, w, h);
      } catch (innerErr) {
        console.error('getImageData failed para celda', cell.n, innerErr);
        results.push({ ...cell, detect: 'Me falta', confidence: 'media', cellImage: null, metrics: null });
        continue;
      }
      
      // Desrotar el crop según frameRotation para que las láminas se vean
      // en su orientación natural (vertical jugadores/escudo, horizontal plantel)
      // Si frameRotation=90, debo rotar el crop 270° (=90° CCW) para deshacer
      const fr = cell.frameRotation || 0;
      const undoRotation = (360 - fr) % 360;
      if (undoRotation !== 0) {
        imgData = rotateImageData(imgData, undoRotation);
      }
      
      const metrics = analyzeCell(imgData);
      
      // === DETECTORES (Fase 1 - color) ===
      const refColor = (cell.n <= 10) ? albumColors.left : albumColors.right;
      metrics.bgMatch = detectAlbumBgMatch(imgData, refColor);
      metrics.whiteText = detectWhiteText(imgData);
      
      // === DETECTORES (Fase 2 - espaciales) ===
      const spatial = analyzeSpatialPatterns(imgData);
      metrics.skinPct = spatial.skinPct;
      metrics.skinCompact = spatial.skinCompact;
      metrics.shirtUniform = spatial.shirtUniform;
      metrics.shirtSat = spatial.shirtSat;
      metrics.verticalVariety = spatial.verticalVariety;
      metrics.edgeConcentration = spatial.edgeConcentration;
      metrics.linesPerKpx = spatial.linesPerKpx;
      metrics.centerDom = spatial.centerDom;
      
      const decision = decideCell(metrics, cell.tipo);
      
      const previewCanvas = document.createElement('canvas');
      previewCanvas.width = imgData.width;
      previewCanvas.height = imgData.height;
      previewCanvas.getContext('2d').putImageData(imgData, 0, 0);
      const cellImage = previewCanvas.toDataURL('image/jpeg', 0.7);
      
      results.push({
        ...cell,
        detect: decision.veredicto,
        confidence: decision.confianza,
        razon: decision.razon,
        cellImage,
        metrics
      });
    }
    
    ScanState.cells = results;
    ScanState.step = 'results';
    renderScanStep();
  } catch (err) {
    console.error('Error en análisis:', err);
    alert('Error analizando la foto: ' + err.message);
    ScanState.step = 'calibrate';
    renderScanStep();
  }
}

function renderResultsStep() {
  const content = document.getElementById('scanContent');
  const tengo = ScanState.cells.filter(c => c.detect === 'Tengo').length;
  const falta = ScanState.cells.filter(c => c.detect === 'Me falta').length;
  const dudosos = ScanState.cells.filter(c => c.confidence === 'media').length;
  
  let cellsHtml = '';
  ScanState.cells.sort((a, b) => a.n - b.n).forEach(c => {
    const cls = c.detect === 'Tengo' ? 'tengo' : 'falta';
    const dudosoMark = c.confidence === 'media' ? ' dudoso' : '';
    const icon = c.detect === 'Tengo' ? '✓' : '○';
    cellsHtml += '<div class="scan-result-cell ' + cls + dudosoMark + '" data-num="' + c.n + '">' +
      (c.cellImage ? '<img src="' + c.cellImage + '" />' : '<div style="width:100%;height:100%;background:rgba(255,255,255,0.05);"></div>') +
      '<span class="scan-cell-label">' + ScanState.team.substring(0,3).toUpperCase() + ' ' + c.n + '</span>' +
      '<span class="scan-cell-icon">' + icon + '</span></div>';
  });
  
  content.innerHTML = '<div class="scan-help" style="background:rgba(0,176,79,0.12);border-color:rgba(0,176,79,0.3);color:#A0E5B8;">' +
    '<div class="scan-help-title" style="color:#5DCAA5;">✓ Análisis completado</div>' +
    'Toca cualquier lámina para corregir su estado. Las que tienen el ícono <strong>?</strong> son las que el algoritmo no detectó con certeza.</div>' +
    '<div class="scan-summary">' +
    '<div class="scan-summary-item"><span class="scan-summary-num green" id="rsTengo">' + tengo + '</span><span class="scan-summary-label">Tengo</span></div>' +
    '<div class="scan-summary-item"><span class="scan-summary-num red" id="rsFalta">' + falta + '</span><span class="scan-summary-label">Me faltan</span></div>' +
    '<div class="scan-summary-item"><span class="scan-summary-num yellow" id="rsDudosos">' + dudosos + '</span><span class="scan-summary-label">Dudosos</span></div>' +
    '</div>' +
    '<div class="scan-results-grid" id="resultsGrid">' + cellsHtml + '</div>' +
    '<button class="scan-action-btn" id="applyResultsBtn" onclick="applyScanResults()">✓ Aplicar al álbum</button>' +
    '<button class="scan-action-btn reset" id="restartScanBtn" style="margin-top:8px;">↺ Empezar de nuevo</button>';
  
  content.querySelectorAll('.scan-result-cell').forEach(el => {
    el.addEventListener('click', () => {
      const num = parseInt(el.dataset.num);
      const cell = ScanState.cells.find(c => c.n === num);
      cell.detect = cell.detect === 'Tengo' ? 'Me falta' : 'Tengo';
      cell.confidence = 'manual';
      el.classList.remove('tengo', 'falta', 'dudoso');
      el.classList.add(cell.detect === 'Tengo' ? 'tengo' : 'falta');
      el.querySelector('.scan-cell-icon').textContent = cell.detect === 'Tengo' ? '✓' : '○';
      updateScanSummary();
    });
  });
  
  document.getElementById('restartScanBtn').addEventListener('click', () => {
    if (!confirm('¿Empezar de nuevo? Se perderán los resultados actuales.')) return;
    ScanState.step = 'init';
    ScanState.team = null;
    ScanState.imageObject = null;
    ScanState.leftFrame = null;
    ScanState.rightFrame = null;
    ScanState.cells = [];
    ScanState.rotation = 0;
    ScanState.view = { zoom: 1, offsetX: 0, offsetY: 0 };
    renderScanStep();
  });
}

function updateScanSummary() {
  const tengo = ScanState.cells.filter(c => c.detect === 'Tengo').length;
  const falta = ScanState.cells.filter(c => c.detect === 'Me falta').length;
  const dudosos = ScanState.cells.filter(c => c.confidence === 'media').length;
  document.getElementById('rsTengo').textContent = tengo;
  document.getElementById('rsFalta').textContent = falta;
  document.getElementById('rsDudosos').textContent = dudosos;
}

function applyScanResults() {
  // VERSION MINIMALISTA - usa feedback inmediato para diagnóstico
  console.log('[apply] CLICK detectado, iniciando...');
  showToast('Procesando...');
  
  // Diferir el resto del trabajo para que el toast se vea PRIMERO (evita bloqueos en mobile)
  setTimeout(function() {
    try {
      const teamItems = ITEMS.filter(it => it.eq === ScanState.team);
      if (!teamItems || teamItems.length === 0) {
        alert('ERROR: No se encontró el equipo: ' + ScanState.team);
        return;
      }
      const codPrefix = teamItems[0].cod.split(' ')[0];
      
      // Calcular cambios
      let agregados = 0, quitados = 0, repsAfectadas = 0, laminasConReps = [];
      const detalleCambios = [];
      ScanState.cells.forEach(cell => {
        const targetCod = codPrefix + ' ' + cell.n;
        const item = teamItems.find(it => it.cod === targetCod);
        if (item) {
          const nuevoEstado = cell.detect === 'Tengo' ? 1 : 0;
          if (item.s !== nuevoEstado) {
            if (nuevoEstado === 1) agregados++;
            else {
              quitados++;
              // Si esta lámina tenía repetidas, se van a perder al pasarla a Falta
              if ((item.r || 0) > 0) {
                repsAfectadas += item.r;
                laminasConReps.push({ cod: targetCod, reps: item.r });
              }
            }
            detalleCambios.push({ cod: targetCod, despues: nuevoEstado });
          }
        }
      });
      const totalCambios = agregados + quitados;
      console.log('[apply] Cambios calculados:', totalCambios, '| repetidas afectadas:', repsAfectadas);
      
      // (Validación HSV multi-zona deshabilitada por baja confiabilidad)
      validateTeamMatch(ScanState.team, ScanState.measuredFp);
      
      // === VALIDACIÓN DE PAÍS POR COLORES DE BANDERA ===
      const colorPresence = ScanState.imageObject ? analyzeColorPresence(ScanState.imageObject) : null;
      const validation = validateCountryByColors(ScanState.team, colorPresence);
      console.log('[country-validation]', validation);
      
      // Mensaje claro estilo lista (más entendible)
      let advertenciaReps = '';
      if (repsAfectadas > 0) {
        const listaReps = laminasConReps.map(x => x.cod + ' (' + x.reps + ' rep)').join(', ');
        advertenciaReps = 
          '<div style="background:rgba(255,107,53,0.18);border:2px solid #FF6B35;color:#FFCBB0;padding:10px 12px;margin:8px 0;border-radius:8px;font-size:0.9rem;line-height:1.4;">' +
          '<strong>⚠️ Atención:</strong> al pasar a "Me falta" estas láminas, <strong>se perderán ' + repsAfectadas + ' repetidas</strong>: ' + listaReps +
          '</div>';
      }
      
      const summary = advertenciaReps +
        '<div style="font-size:1rem;line-height:1.7;">' +
        '<div style="margin-bottom:8px;">📋 Vas a aplicar a <strong style="color:#FFC72C;">' + ScanState.team + '</strong>:</div>' +
        '<div style="background:rgba(0,176,79,0.12);border-left:3px solid #00B04F;padding:8px 12px;margin:6px 0;border-radius:6px;">' +
          '<strong style="color:#5DCAA5;">+' + agregados + '</strong> láminas pasarán a <strong>Tengo</strong></div>' +
        '<div style="background:rgba(255,59,48,0.12);border-left:3px solid #FF3B30;padding:8px 12px;margin:6px 0;border-radius:6px;">' +
          '<strong style="color:#FF6B5B;">' + quitados + '</strong> láminas pasarán a <strong>Me falta</strong></div>' +
        '<div style="margin-top:10px;text-align:center;font-weight:700;">Total: <strong style="color:#FFC72C;font-size:1.2rem;">' + totalCambios + '</strong> cambios</div>' +
        '</div>';
      
      if (totalCambios === 0) {
        showSimpleModal('Sin cambios', summary + '<div style="text-align:center;opacity:0.7;margin-top:10px;">No hay nada que actualizar</div>', 'Cerrar', null, function() {
          closeScanOverlay();
        });
        return;
      }
      
      // === PREVIEW DEL TÍTULO + ALERTA DE PAÍS ===
      let titlePreviewHTML = '';
      try {
        if (ScanState.imageObject) {
          const img = ScanState.imageObject;
          const titleCanvas = document.createElement('canvas');
          // Zona del título AMPLIADA: y=2-25%, x=0-45% (muestra WE ARE + nombre país + bandera + escudo)
          const tw = Math.floor(img.width * 0.45);
          const th = Math.floor(img.height * 0.23);
          titleCanvas.width = tw;
          titleCanvas.height = th;
          const tctx = titleCanvas.getContext('2d');
          tctx.drawImage(img, 0, Math.floor(img.height * 0.02), tw, th, 0, 0, tw, th);
          const dataUrl = titleCanvas.toDataURL('image/jpeg', 0.65);
          
          // Mensaje según resultado de validación
          let alertBanner = '';
          let bannerStyle = '';
          
          if (validation.status === 'error') {
            // ❌ ERROR EXPLÍCITO: la foto NO parece ser del país elegido
            bannerStyle = 'background:rgba(255,59,48,0.20);border:2px solid #FF3B30;color:#FFB3AB;';
            alertBanner = 
              '<div style="font-weight:900;font-size:1.05rem;margin-bottom:6px;">❌ Parece que elegiste un país equivocado</div>' +
              '<div style="font-size:0.85rem;opacity:0.95;line-height:1.4;">La foto no coincide con <strong>' + ScanState.team + '</strong>. ' +
              'Verifica con la imagen abajo. Si no coincide, <strong>cancela</strong> y elige el país correcto antes de aplicar.</div>';
          } else if (validation.status === 'warning') {
            // ⚠️ WARNING: coincidencia débil
            bannerStyle = 'background:rgba(255,149,0,0.18);border:2px solid #FF9500;color:#FFD49A;';
            alertBanner = 
              '<div style="font-weight:800;font-size:1rem;margin-bottom:4px;">⚠️ Verificación necesaria</div>' +
              '<div style="font-size:0.85rem;opacity:0.95;">La coincidencia con <strong>' + ScanState.team + '</strong> es débil. Confirma visualmente abajo.</div>';
          } else if (validation.status === 'ok') {
            // ✓ OK: la detección automática no encontró señales de error,
            // PERO países con colores similares pueden pasar este filtro.
            // Por eso pedimos verificación visual igual.
            bannerStyle = 'background:rgba(255,199,44,0.18);border:2px solid #FFC72C;color:#FFE699;';
            alertBanner = 
              '<div style="font-weight:900;font-size:1.05rem;margin-bottom:6px;">👀 Verifica visualmente</div>' +
              '<div style="font-size:0.9rem;opacity:0.95;line-height:1.4;">La validación automática no encontró problemas evidentes, pero <strong>confirma abajo</strong> que el título coincide con <strong>' + ScanState.team + '</strong>. Países con colores parecidos pueden pasar este filtro.</div>';
          } else {
            // ❓ unknown: el país no está en la base de validación
            // Como NO podemos validar automáticamente, forzamos verificación visual MUY visible
            bannerStyle = 'background:rgba(255,149,0,0.20);border:2px solid #FF9500;color:#FFD49A;';
            alertBanner = 
              '<div style="font-weight:900;font-size:1.1rem;margin-bottom:6px;">⚠️ Confirma visualmente</div>' +
              '<div style="font-size:0.9rem;opacity:0.95;line-height:1.4;">Mira abajo: ¿la foto es de <strong>' + ScanState.team + '</strong>?<br>' +
              'Si no coincide, <strong>cancela</strong> y elige el país correcto.</div>';
          }
          
          titlePreviewHTML =
            '<div style="margin-bottom:14px;padding:12px;border-radius:10px;' + bannerStyle + '">' +
            alertBanner +
            '<img src="' + dataUrl + '" style="width:100%;border-radius:6px;display:block;margin-top:8px;" alt="título de tu foto" />' +
            '</div>';
        }
      } catch(e) { console.warn('Preview título falló:', e); }
      
      // Texto del botón cambia según el status
      let confirmText = '✓ Sí, es ' + ScanState.team;
      let modalTitle = '¿Aplicar al álbum?';
      if (validation.status === 'error') {
        confirmText = '⚠️ Aplicar igual';
        modalTitle = '⚠️ Posible error de país';
      }
      
      showSimpleModal(modalTitle, titlePreviewHTML + summary, confirmText, 'Cancelar',
        function() {
          console.log('[apply] Confirmado, aplicando', totalCambios, 'cambios');
          detalleCambios.forEach(c => {
            const item = teamItems.find(it => it.cod === c.cod);
            if (item) {
              item.s = c.despues;
              // Si la lámina pasa a Falta (s=0), también limpiar repetidas
              if (item.s === 0) item.r = 0;
              // Si pasa de Falta a Tengo, mantener r=0 (no había repetidas previas)
            }
          });
          save();
          updateStats();
          render();
          closeScanOverlay();
          showToast('✓ ' + ScanState.team + ': ' + totalCambios + ' cambios aplicados');
        }
      );
    } catch (err) {
      console.error('[apply] ERROR:', err);
      alert('Error: ' + err.message);
    }
  }, 50);
}

function closeScanOverlay() {
  document.getElementById('scanOverlay').classList.remove('active');
  const sc = document.getElementById('scanContent');
  sc.classList.remove('has-fixed-actions');
  sc.classList.remove('scan-with-zoom-bar');
}

// Modal simple y robusto (mobile-friendly, sin confirm() del navegador)
function showSimpleModal(title, htmlBody, primaryText, secondaryText, onPrimary) {
  // Quitar previos
  const prev = document.getElementById('simpleModal');
  if (prev) prev.remove();
  
  const ov = document.createElement('div');
  ov.id = 'simpleModal';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;';
  
  let btns = '<button id="smPrimary" style="flex:1;padding:16px;background:#00B04F;color:white;border:none;border-radius:10px;font-weight:800;font-size:1.05rem;cursor:pointer;min-height:56px;">' + primaryText + '</button>';
  if (secondaryText) {
    btns = '<button id="smSecondary" style="flex:1;padding:16px;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);border:1px solid rgba(255,255,255,0.3);border-radius:10px;font-weight:700;font-size:1.05rem;cursor:pointer;min-height:56px;">' + secondaryText + '</button>' + btns;
  }
  
  ov.innerHTML = '<div style="background:#1a1a1a;border-radius:16px;padding:24px;max-width:480px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.6);">' +
    '<div style="color:white;font-size:1.4rem;font-weight:900;text-align:center;margin-bottom:16px;">' + title + '</div>' +
    '<div style="color:rgba(255,255,255,0.92);font-size:1rem;line-height:1.5;">' + htmlBody + '</div>' +
    '<div style="display:flex;gap:10px;margin-top:18px;">' + btns + '</div>' +
    '</div>';
  
  document.body.appendChild(ov);
  
  // Asignar listeners DESPUÉS de insertar al DOM
  const primaryBtn = document.getElementById('smPrimary');
  primaryBtn.onclick = function(ev) {
    ev.preventDefault(); ev.stopPropagation();
    ov.remove();
    if (onPrimary) onPrimary();
  };
  if (secondaryText) {
    document.getElementById('smSecondary').onclick = function(ev) {
      ev.preventDefault(); ev.stopPropagation();
      ov.remove();
    };
  }
}

// Función legacy mantenida por compatibilidad (no debería usarse)
function showCountryAlert(validation, summaryMsg, callback) {
  // Quitar modal previo si existe
  const prev = document.getElementById('countryAlertOverlay');
  if (prev) prev.remove();
  
  const isError = validation.match === false;
  const overlay = document.createElement('div');
  overlay.id = 'countryAlertOverlay';
  overlay.className = 'country-alert-overlay';
  
  const icon = isError ? '⛔' : '⚠️';
  const title = isError ? 'PAÍS NO COINCIDE' : 'POSIBLE ERROR DE PAÍS';
  const message = validation.message.replace(/^[⚠️⛔]\s*/, '');
  
  overlay.innerHTML =
    '<div class="country-alert-box ' + (isError ? '' : 'warning') + '">' +
    '<div class="country-alert-icon">' + icon + '</div>' +
    '<div class="country-alert-title">' + title + '</div>' +
    '<div class="country-alert-msg">' + message + '</div>' +
    '<div class="country-alert-summary">' + summaryMsg.replace(/\n/g, '<br>') + '</div>' +
    '<div class="country-alert-actions">' +
    '<button class="country-alert-btn cancel" id="ca-cancel">↺ Cancelar y revisar</button>' +
    '<button class="country-alert-btn confirm" id="ca-confirm">Aplicar igual</button>' +
    '</div></div>';
  
  document.body.appendChild(overlay);
  document.getElementById('ca-cancel').addEventListener('click', function() {
    overlay.remove();
    callback(false);
  });
  document.getElementById('ca-confirm').addEventListener('click', function() {
    overlay.remove();
    callback(true);
  });
}


// === REGISTRO DEL SERVICE WORKER (PWA real) ===
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js', { scope: './' })
      .then(reg => {
        console.log('[PWA] Service Worker registrado:', reg.scope);
        // Detectar actualizaciones disponibles
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          if (!newSW) return;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              // Hay una nueva versión esperando, mostrar aviso
              showUpdateAvailableToast();
            }
          });
        });
      })
      .catch(err => console.warn('[PWA] SW registration failed:', err));
  });
  
  // Si el SW cambia de control, recargar para tomar la nueva versión
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    window.location.reload();
  });
}

function showUpdateAvailableToast() {
  const banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;bottom:160px;left:50%;transform:translateX(-50%);background:#0066CC;color:white;padding:14px 18px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.4);z-index:9999;font-weight:700;display:flex;gap:10px;align-items:center;max-width:90%;';
  banner.innerHTML = '<span>🎉 Nueva versión disponible</span><button id="reloadAppBtn" style="padding:6px 12px;background:white;color:#0066CC;border:none;border-radius:8px;font-weight:800;cursor:pointer;">Actualizar</button>';
  document.body.appendChild(banner);
  document.getElementById('reloadAppBtn').addEventListener('click', () => {
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    });
  });
}
